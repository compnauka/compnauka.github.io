<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бітовий Конвертер</title>

    <!-- Спільний хедер/футер сайту -->
    <script src="/_shell/site-shell.js" data-back="/#digital-tools" data-title="Бітовий Конвертер" defer></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N8T05K3NGT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-N8T05K3NGT');
    </script>

    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-kBgdFkemKx0WM6VJQvasn.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
        }

        /* Темна тема (узгоджено зі спільним site-shell) */
        body.dark-mode { background-color: #0f172a; }
        body.dark-mode .container { background: #1e293b; }
        body.dark-mode h1,
        body.dark-mode .result { color: #e2e8f0; }
        body.dark-mode .bit-description,
        body.dark-mode .bit-input label { color: #94a3b8; }
        body.dark-mode .result { background-color: #0f172a; }
        body.dark-mode .bit-toggle { border-color: #475569; color: #e2e8f0; }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 25px;
            color: #333;
        }

        .bit-description {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 25px;
        }

        #bits {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }

        .bit-input {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bit-input label {
            margin-bottom: 8px;
            font-size: 1rem;
            color: #666;
        }

        .bit-toggle {
            width: 70px;
            height: 70px;
            font-size: 2rem;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .result {
            font-size: 2rem;
            color: #333;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px;
                max-width: 95%;
            }

            #bits {
                gap: 10px;
            }

            .bit-toggle {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .bit-description {
                font-size: 1rem;
            }

            .result {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Бітовий Конвертер</h1>
        <p class="bit-description">Натисніть на біт, щоб змінити його значення:</p>
        <div id="bits">
            <!-- Bit toggles will be dynamically generated -->
        </div>
        <div class="result">
            Число: <span id="decimal">0</span>
        </div>
    </div>

    <script>
        // Dynamically create bit toggles
        const bitsContainer = document.getElementById('bits');
        const decimalOutput = document.getElementById('decimal');
        const bitCount = 8;

        function createBitToggles() {
            for (let i = bitCount - 1; i >= 0; i--) {
                const bitInput = document.createElement('div');
                bitInput.className = 'bit-input';
                
                const label = document.createElement('label');
                label.textContent = `Біт ${i}`;
                
                const toggle = document.createElement('div');
                toggle.className = 'bit-toggle';
                toggle.dataset.bit = i;
                toggle.textContent = '0';
                
                toggle.addEventListener('click', () => {
                    toggle.classList.toggle('active');
                    toggle.textContent = toggle.classList.contains('active') ? '1' : '0';
                    updateDecimal();
                });
                
                bitInput.appendChild(label);
                bitInput.appendChild(toggle);
                bitsContainer.appendChild(bitInput);
            }
        }

        function updateDecimal() {
            const bitToggles = document.querySelectorAll('.bit-toggle');
            let decimalValue = 0;

            bitToggles.forEach(toggle => {
                const bitPosition = parseInt(toggle.dataset.bit, 10);
                const bitValue = toggle.classList.contains('active') ? 1 : 0;

                // Calculate decimal value
                decimalValue += bitValue * Math.pow(2, bitPosition);
            });

            decimalOutput.textContent = decimalValue;
        }

        // Initialize
        createBitToggles();
    </script>
</body>
</html>
