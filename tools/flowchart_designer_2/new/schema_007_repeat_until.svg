<svg xmlns="http://www.w3.org/2000/svg" width="780" height="560" viewBox="0 0 780 560">
  <rect width="780" height="560" fill="#fafbff"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#b8c4ff" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5c647c"/>
    </marker>
  </defs>

  <text x="390" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#2d3a66">
    Цикл repeat-until: дія перед перевіркою
  </text>

  <g filter="url(#shadow)">
    <rect x="280" y="74" rx="28" ry="28" width="220" height="64" fill="#4caf50"/>
    <text x="390" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Початок</text>

    <rect x="300" y="182" rx="18" ry="18" width="180" height="70" fill="#03a9f4"/>
    <text x="390" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Виконати дію</text>

    <polygon points="390,300 520,410 390,520 260,410" fill="#ff9800"/>
    <text x="390" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Умова?</text>
    <text x="390" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff7e6">Зупинитись?</text>
  </g>

  <path d="M390 138 L390 182" stroke="#5c647c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M390 252 L390 300" stroke="#5c647c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M300 410 L160 410 L160 218 L300 218" stroke="#f44336" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M520 410 L640 410" stroke="#4caf50" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g>
    <rect x="112" y="380" rx="14" ry="14" width="60" height="42" fill="#ffffff" stroke="#f44336" stroke-width="3"/>
    <text x="142" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#c62828">Ні</text>
  </g>

  <g>
    <rect x="612" y="380" rx="14" ry="14" width="76" height="42" fill="#ffffff" stroke="#4caf50" stroke-width="3"/>
    <text x="650" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2e7d32">Так</text>
  </g>

  <text x="646" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#2d3a66">Вихід з циклу</text>
</svg>
