<svg xmlns="http://www.w3.org/2000/svg" width="780" height="520" viewBox="0 0 780 520">
  <rect width="780" height="520" fill="#fafbff"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#b8c4ff" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5c647c"/>
    </marker>
  </defs>

  <text x="390" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#2d3a66">
    Цикл while: перевірка перед дією
  </text>

  <g filter="url(#shadow)">
    <rect x="280" y="70" rx="28" ry="28" width="220" height="64" fill="#4caf50"/>
    <text x="390" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Початок</text>

    <polygon points="390,165 520,275 390,385 260,275" fill="#ff9800"/>
    <text x="390" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Умова?</text>
    <text x="390" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff7e6">Поки істинна</text>

    <rect x="300" y="420" rx="18" ry="18" width="180" height="70" fill="#03a9f4"/>
    <text x="390" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Виконати дію</text>
  </g>

  <path d="M390 134 L390 165" stroke="#5c647c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M390 385 L390 420" stroke="#5c647c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M300 275 L160 275 L160 455 L300 455" stroke="#4caf50" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M480 455 L610 455 L610 275 L520 275" stroke="#f44336" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g>
    <rect x="112" y="245" rx="14" ry="14" width="76" height="42" fill="#ffffff" stroke="#4caf50" stroke-width="3"/>
    <text x="150" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2e7d32">Так</text>
  </g>

  <g>
    <rect x="584" y="245" rx="14" ry="14" width="60" height="42" fill="#ffffff" stroke="#f44336" stroke-width="3"/>
    <text x="614" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#c62828">Ні</text>
  </g>

  <text x="610" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#2d3a66">Вихід з циклу</text>
</svg>
