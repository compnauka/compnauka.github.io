<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Пензлик | Графічний редактор для дітей</title>
  <meta name="description"
    content="Пензлик — це простий та веселий онлайн-редактор малюнків для дітей. Малюйте олівцем, використовуйте фігури, штампи та яскраві кольори. Творіть із задоволенням!" />
  <meta name="keywords"
    content="графічний редактор для дітей, онлайн малювання, пензлик, малювання для малюків, штампи, фігури, заливка, дитяча творчість" />
  <link rel="canonical" href="https://itnauka.org/tools/penslyk/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://itnauka.org/tools/penslyk/" />
  <meta property="og:title" content="Пензлик | Графічний редактор для дітей" />
  <meta property="og:description"
    content="Веселий та простий онлайн-інструмент для дитячої творчості: малювання, фігури, штампи та багато іншого." />
  <meta property="og:image" content="https://itnauka.org/images/27.jpg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://itnauka.org/tools/penslyk/" />
  <meta property="twitter:title" content="Пензлик | Графічний редактор для дітей" />
  <meta property="twitter:description"
    content="Веселий та простий онлайн-інструмент для дитячої творчості: малювання, фігури, штампи та багато іншого." />
  <meta property="twitter:image" content="https://itnauka.org/images/27.jpg" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#FFDE00" />

  <!-- Fonts + Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Analytics (optional — kept as-is) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N8T05K3NGT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-N8T05K3NGT');
  </script>

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Пензлик",
      "operatingSystem": "Any",
      "applicationCategory": "MultimediaApplication",
      "description": "Простий та веселий онлайн-редактор малюнків для дітей з фігурами та штампами.",
      "offers": {
        "@type": "Offer",
        "price": "0"
      }
    }
  </script>

  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind config (AFTER CDN) -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'sans-serif'] },
          colors: {
            'neo-yellow': '#FFDE00',
            'neo-blue': '#3B82F6',
            'neo-red': '#FF4D4D',
            'neo-green': '#00E055',
            'neo-purple': '#A855F7',
            'neo-dark': '#1a1a1a',
            'dark-bg': '#121212',
            'dark-card': '#1e1e1e',
          },
          boxShadow: {
            'neo': '4px 4px 0px 0px #000000',
            'neo-sm': '2px 2px 0px 0px #000000',
            'neo-lg': '8px 8px 0px 0px #000000',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body
  class="bg-neo-yellow dark:bg-dark-bg flex flex-col selection:bg-neo-purple selection:text-white transition-colors duration-300">

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <header id="app-header"
    class="sticky top-0 flex-none bg-neo-yellow dark:bg-dark-card border-b-4 border-black p-3 flex justify-between items-center z-50">

    <div class="flex items-center gap-4 select-none">
      <div
        class="w-12 h-12 sm:w-14 sm:h-14 bg-neo-purple border-4 border-black rounded-2xl flex items-center justify-center text-white text-xl sm:text-2xl shadow-neo-sm transform rotate-2">
        <i class="fas fa-paintbrush"></i>
      </div>
      <h1 class="text-xl sm:text-2xl font-black uppercase tracking-tight">Пензлик</h1>
    </div>

    <div class="flex gap-2 sm:gap-3">
      <button onmousedown="event.preventDefault()" onclick="App.toggleTheme()"
        class="neo-btn bg-gray-700 text-white w-12 h-12 sm:w-14 sm:h-14" title="Тема" aria-label="Змінити тему">
        <i id="theme-icon" class="fas fa-moon text-lg sm:text-xl"></i>
      </button>

      <button onmousedown="event.preventDefault()" onclick="App.undo()"
        class="neo-btn bg-white w-12 h-12 sm:w-14 sm:h-14" title="Скасувати (Ctrl+Z)" aria-label="Скасувати">
        <i class="fas fa-undo text-lg sm:text-xl"></i>
      </button>

      <button onmousedown="event.preventDefault()" onclick="App.redo()"
        class="neo-btn bg-white w-12 h-12 sm:w-14 sm:h-14" title="Повторити (Ctrl+Y)" aria-label="Повторити">
        <i class="fas fa-redo text-lg sm:text-xl"></i>
      </button>

      <label class="neo-btn bg-orange-400 text-black w-12 h-12 sm:w-14 sm:h-14 cursor-pointer"
        title="Відкрити зображення" aria-label="Відкрити зображення">
        <i class="fas fa-folder-open text-lg sm:text-xl"></i>
        <input id="file-input" type="file" accept="image/*" class="hidden" />
      </label>

      <button onmousedown="event.preventDefault()" onclick="App.askClear()"
        class="neo-btn bg-neo-red text-white w-12 h-12 sm:w-14 sm:h-14" title="Очистити полотно"
        aria-label="Очистити полотно">
        <i class="fas fa-trash-alt text-lg sm:text-xl"></i>
      </button>

      <button onmousedown="event.preventDefault()" onclick="App.save()"
        class="neo-btn bg-neo-green px-4 sm:px-6 h-12 sm:h-14 gap-2 text-sm sm:text-base" title="Зберегти (Ctrl+S)"
        aria-label="Зберегти малюнок">
        <i class="fas fa-save text-lg sm:text-xl"></i>
        <span class="hidden md:inline font-black uppercase">Зберегти</span>
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       TOOLS TOOLBAR (purple)
  ══════════════════════════════════════ -->
  <div id="tools-toolbar"
    class="sticky top-[76px] sm:top-[84px] flex-none bg-neo-purple border-b-4 border-black p-2 overflow-x-auto no-scrollbar z-40">
    <div class="max-w-5xl mx-auto flex items-center gap-2 sm:gap-3 justify-center min-w-max px-2">

      <!-- Drawing tools group -->
      <div class="flex gap-1 sm:gap-2 bg-black/10 p-1 rounded-2xl">

        <button id="tool-pencil" onmousedown="event.preventDefault()" onclick="App.selectTool('pencil')"
          class="neo-btn bg-neo-blue text-white w-12 h-12 sm:w-14 sm:h-14 text-lg sm:text-xl" title="Пензлик"
          aria-label="Пензлик">
          <i class="fas fa-paintbrush"></i>
        </button>

        <button id="tool-eraser" onmousedown="event.preventDefault()" onclick="App.selectTool('eraser')"
          class="neo-btn bg-white w-12 h-12 sm:w-14 sm:h-14 text-lg sm:text-xl" title="Гумка" aria-label="Гумка">
          <i class="fas fa-eraser"></i>
        </button>

        <!-- NEW: Bucket / flood-fill tool -->
        <button id="tool-bucket" onmousedown="event.preventDefault()" onclick="App.selectTool('bucket')"
          class="neo-btn bg-orange-300 w-12 h-12 sm:w-14 sm:h-14 text-lg sm:text-xl" title="Заливка"
          aria-label="Заливка">
          <i class="fas fa-fill-drip"></i>
        </button>

        <button id="tool-shapes" onmousedown="event.preventDefault()" onclick="App.toggleExtra('shapes')"
          class="neo-btn bg-neo-yellow w-12 h-12 sm:w-14 sm:h-14 text-lg sm:text-xl" title="Фігури" aria-label="Фігури">
          <i class="fas fa-shapes"></i>
        </button>

        <button id="tool-stamps" onmousedown="event.preventDefault()" onclick="App.toggleExtra('stamps')"
          class="neo-btn bg-teal-300 w-12 h-12 sm:w-14 sm:h-14 text-lg sm:text-xl" title="Штампи" aria-label="Штампи">
          <i class="fas fa-face-smile"></i>
        </button>

      </div>

      <!-- Colors block -->
      <div class="flex items-center gap-2 bg-white border-4 border-black p-1.5 rounded-2xl shadow-neo-sm h-12 sm:h-14">
        <div id="palette" class="flex gap-2 items-center"></div>
        <!-- Custom color wheel -->
        <div
          class="relative w-10 h-10 rounded-full border-4 border-black shadow-neo-sm overflow-hidden shrink-0 cursor-pointer transition-transform hover:scale-110 active:scale-95"
          title="Свій колір">
          <div class="absolute inset-0 w-full h-full"
            style="background: conic-gradient(red, orange, yellow, lime, cyan, blue, magenta, red);"></div>
          <input type="color" id="custom-color" value="#000000"
            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer p-0 border-0" aria-label="Свій колір" />
        </div>
      </div>

      <!-- Size block -->
      <div class="flex items-center gap-2 bg-white border-4 border-black p-1.5 rounded-2xl shadow-neo-sm h-12 sm:h-14">
        <div class="w-8 flex justify-center">
          <i class="fas fa-sliders text-lg sm:text-xl text-neo-dark"></i>
        </div>
        <input id="size" type="range" min="1" max="40" value="6" class="neo-range" aria-label="Розмір пензлика" />
        <div id="size-badge"
          class="min-w-[2.5rem] flex justify-center items-center font-black text-lg sm:text-xl text-neo-dark">6</div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════
       EXTRA TOOLBAR (teal) — toggled by Shapes / Stamps
  ══════════════════════════════════════ -->
  <div id="extra-toolbar" class="extra-toolbar-fixed hidden" role="region" aria-label="Додаткові інструменти">
    <div class="extra-toolbar-fixed-inner">
      <div
        class="max-w-5xl mx-auto flex gap-3 justify-center items-center overflow-x-auto overflow-y-visible no-scrollbar py-1 px-2">

        <!-- Shapes panel -->
        <div id="panel-shapes" class="hidden items-center gap-2 min-w-max">
          <button class="neo-btn bg-white w-12 h-12 sm:w-14 sm:h-14 text-xl" data-shape="line" title="Лінія"
            aria-label="Лінія">╱</button>
          <button class="neo-btn bg-white w-12 h-12 sm:w-14 sm:h-14 text-xl" data-shape="rect"
            title="Прямокутник (Shift = квадрат)" aria-label="Прямокутник">□</button>
          <button class="neo-btn bg-white w-12 h-12 sm:w-14 sm:h-14 text-xl" data-shape="circle"
            title="Еліпс (Shift = коло)" aria-label="Еліпс">○</button>
          <button class="neo-btn bg-white w-12 h-12 sm:w-14 sm:h-14 text-xl" data-shape="triangle" title="Трикутник"
            aria-label="Трикутник">△</button>
          <button class="neo-btn bg-white w-12 h-12 sm:w-14 sm:h-14 text-xl" data-shape="star" title="Зірка"
            aria-label="Зірка">★</button>
          <div class="h-8 w-[1px] bg-black/20 mx-1"></div>
          <label class="flex items-center gap-2 font-black select-none dark:text-white cursor-pointer"
            title="Заповнювати фігуру кольором">
            <input id="fill-toggle" type="checkbox" class="neo-check" checked aria-label="Заливка фігур" />
            <span>ЗАЛИВКА</span>
          </label>
        </div>

        <!-- Stamps panel -->
        <div id="panel-stamps" class="hidden items-center gap-3 min-w-max">
          <button onmousedown="event.preventDefault()" onclick="App.shuffleStamps()"
            class="neo-btn bg-neo-yellow w-12 h-12 sm:w-14 sm:h-14 shrink-0 text-2xl sm:text-3xl shadow-neo-sm"
            title="Перемішати штампи" aria-label="Перемішати штампи">🎲</button>
          <div id="stamps" class="flex gap-2 min-w-max" role="group" aria-label="Штампи"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       CANVAS AREA
  ══════════════════════════════════════ -->
  <main class="app-main flex-grow min-h-0 flex flex-col bg-neo-yellow/10 dark:bg-dark-bg overflow-hidden">
    <div class="max-w-5xl mx-auto w-full flex-grow min-h-0 flex flex-col">
      <div
        class="flex-grow min-h-0 bg-white dark:bg-dark-card border-4 border-black shadow-neo-lg rounded-[2rem] sm:rounded-[2.5rem] overflow-hidden flex flex-col">
        <div class="flex-grow min-h-0 overflow-hidden">
          <div id="canvas-wrap" class="canvas-wrap h-full">
            <canvas id="canvas" role="img" aria-label="Полотно для малювання"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- STATUS BADGE -->
  <div class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-40" aria-live="polite" aria-atomic="true">
    <div
      class="bg-white dark:bg-dark-card border-4 border-black px-4 py-2 sm:px-6 sm:py-3 rounded-2xl sm:rounded-3xl font-black text-lg sm:text-xl shadow-neo dark:text-white">
      <span id="status">ОЛІВЕЦЬ</span>
    </div>
  </div>

  <!-- TOASTS -->
  <div id="toasts"
    class="fixed bottom-12 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-3 pointer-events-none w-max"
    aria-live="assertive" aria-atomic="true"></div>

  <!-- MODAL -->
  <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-msg"
    aria-hidden="true"
    class="fixed inset-0 bg-black/70 z-[200] hidden items-center justify-center p-6 backdrop-blur-md">
    <div
      class="bg-white dark:bg-dark-card border-4 border-black shadow-neo-lg rounded-[2rem] sm:rounded-[2.5rem] p-8 sm:p-10 w-full max-w-lg text-center">
      <h3 id="modal-title" class="text-2xl sm:text-3xl font-black uppercase mb-4 dark:text-white"></h3>
      <p id="modal-msg" class="text-lg sm:text-xl text-gray-600 dark:text-gray-300 mb-8 sm:mb-10 font-bold"></p>
      <div id="modal-actions" class="flex flex-col gap-3 sm:gap-4"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
