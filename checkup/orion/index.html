<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ІнфоЗірки | Я-орієнтири 1-2 клас</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="bubbles"></div>

  <div id="map-screen" class="screen active">
    <div class="map-header">
      <div>
        <div class="map-title">ІнфоЗірки</div>
        <div class="map-sub">Я-орієнтири для 1-2 класів</div>
      </div>
      <div class="stars-counter"><i class="fas fa-star"></i><span id="total-stars">0</span>/<span id="max-stars">60</span></div>
    </div>
    <div class="planet-map" id="planet-map" style="height:920px;">
      <svg class="planet-svg" id="path-svg" viewBox="0 0 420 920" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </div>

  <div id="task-screen" class="screen">
    <div class="task-bg"></div>
    <div class="task-header">
      <button class="back-btn" onclick="returnToMap()"><i class="fas fa-arrow-left"></i></button>
      <div class="tprog-bar"><div class="tprog-fill" id="tprog-fill"></div></div>
      <span class="tprog-count" id="tprog-count">0/10</span>
    </div>
    <div class="task-body" id="task-body"></div>
    <button class="next-btn" id="next-btn" onclick="nextTask()">Далі <i class="fas fa-arrow-right"></i></button>
  </div>

  <div id="badge-screen" class="screen"><div class="badge-box" id="badge-box"></div></div>
  <div id="done-screen" class="screen"><div class="done-box" id="done-box"></div></div>
  <div id="confetti"></div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
