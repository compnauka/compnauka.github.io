<body class="min-h-screen p-4 sm:p-8 flex justify-center items-start pt-8 bg-[var(--color-surface-subtle)]">
    <a href="#main-content" class="skip-link">Перейти до основного вмісту</a>
    <div id="announcements" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

    <main id="main-content" class="w-full max-w-4xl p-0">
<div id="class-selection" class="card bg-white p-6 sm:p-10 text-center transition-all duration-500">
            <h1 id="class-selection-title" class="text-4xl sm:text-5xl font-extrabold text-gray-800 mb-6 text-center"></h1>
            <p id="class-selection-subtitle" class="text-xl text-gray-600 mb-10"></p>

            <div id="class-buttons" class="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6"></div>
        </div>

        <section id="quiz-container" class="hidden card bg-white p-4 sm:p-6 transition-all duration-500" aria-labelledby="question-text">
            <div class="flex justify-between items-center mb-6 border-b pb-4 gap-4 flex-wrap">
                <p class="text-xl font-bold text-blue-600">Завдання <span id="current-question-index">1</span> з <span id="total-questions">10</span></p>
                <div class="text-lg font-medium text-gray-700"><span id="level-label"></span> <span id="current-grade"></span></div>
            </div>

            <h2 id="question-text" class="text-2xl font-semibold text-gray-800 mb-4"></h2>
            <div id="options-container" role="group" aria-labelledby="question-text"></div>

                        <div class="flex flex-col sm:flex-row gap-4 mt-4">
                <button id="skip-button" type="button"
                    class="w-full sm:w-1/2 py-3 text-yellow-600 font-bold text-lg rounded-xl transition duration-300 focus:outline-none focus:ring-4 focus:ring-yellow-300"></button>
                <button id="next-button" type="button"
                    class="w-full sm:w-1/2 py-3 text-white font-bold text-lg rounded-xl transition duration-300 focus:outline-none focus:ring-4 focus:ring-green-300 opacity-50 cursor-not-allowed"
                    disabled></button>
            </div>

            <button id="finish-early-button" type="button"
                class="mt-3 w-full py-3 bg-red-100 text-red-700 font-bold text-lg rounded-xl transition duration-300 hover:bg-red-200 focus:outline-none focus:ring-4 focus:ring-red-300"></button>

            <button id="review-button" type="button" class="mt-4 w-full py-2 text-sm text-blue-500 hover:text-blue-700" style="display:none;">
                <span id="review-button-label">Переглянути пропущені питання</span> (<span id="skipped-count">0</span>)
            </button>
        </section>

        <section id="results-container" class="hidden card bg-white p-6 sm:p-10 text-center transition-all duration-500" aria-labelledby="result-message">
            <h2 class="text-4xl sm:text-5xl font-extrabold mb-4" id="result-message"></h2>
            <p id="result-label" class="text-xl text-gray-600 mb-6"></p>

            <div class="inline-block p-6 rounded-full bg-yellow-100 border-4 border-yellow-400 mb-8 pulse-effect">
                <span id="score-display" class="text-6xl font-black text-yellow-600">0/10</span>
            </div>

            <h3 id="result-analysis-title" class="text-2xl font-bold text-gray-800 mb-4 text-left"></h3>

            <details id="adult-summary-details" class="adult-summary-details bg-slate-50 p-4 rounded-xl mb-4 border-l-4 border-slate-500 text-left">
                <summary id="adult-summary-title" class="font-bold text-slate-800 text-lg"></summary>
                <div class="adult-summary-content mt-3">
                    <p id="adult-summary-text" class="text-sm text-gray-700 mb-2"></p>
                    <p id="adult-summary-strength" class="text-sm text-gray-700 mb-1"></p>
                    <p id="adult-summary-focus" class="text-sm text-gray-700 mb-1"></p>
                    <p id="adult-summary-observed" class="text-sm text-gray-700"></p>
                </div>
            </details>

            <details id="concepts-details" class="adult-summary-details bg-blue-50 p-4 rounded-xl mb-4 border-l-4 border-blue-500 text-left">
                <summary id="concepts-title" class="font-bold text-blue-800 text-lg"></summary>
                <div class="adult-summary-content mt-3">
                    <p id="concept-note" class="text-sm text-gray-700 mb-3"></p>
                    <p id="concept-list" class="text-sm text-gray-700 mb-3"></p>
                    <div id="concept-analytics-list" class="space-y-3"></div>
                </div>
            </details>

            <details id="needs-practice-details" class="adult-summary-details bg-amber-50 p-4 rounded-xl mb-6 border-l-4 border-amber-500 text-left">
                <summary id="needs-practice-title" class="font-bold text-amber-800 text-lg"></summary>
                <div class="adult-summary-content mt-3">
                    <p id="needs-practice-list" class="text-sm text-gray-700"></p>
                </div>
            </details>

            <div id="detailed-results" class="space-y-6 text-left"></div>
            <p id="shared-result-note" class="hidden text-sm text-gray-600 mt-6"></p>

            <div class="mt-10 grid grid-cols-1 sm:grid-cols-2 gap-3">
                <button id="share-button" type="button"
                    class="py-3 px-6 bg-emerald-600 text-white font-bold text-lg rounded-xl transition duration-300 hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-300"></button>
                <button id="restart-button" type="button"
                    class="py-3 px-8 bg-blue-500 text-white font-bold text-lg rounded-xl transition duration-300 hover:bg-blue-600 focus:outline-none focus:ring-4 focus:ring-blue-300"></button>
            </div>
        </section>

        <div id="review-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 p-4"
            role="dialog" aria-modal="true" aria-labelledby="review-title" tabindex="-1">
            <div class="bg-white card w-full max-w-md p-6">
                <h3 id="review-title" class="text-2xl font-bold mb-4 text-gray-800"></h3>
                <p id="review-description" class="text-gray-600 mb-4"></p>
                <div id="modal-question-list" class="grid grid-cols-5 gap-3 max-h-64 overflow-y-auto p-2"></div>
                <button id="review-close-button" type="button"
                    class="mt-6 w-full py-2 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600"></button>
            </div>
        </div>

        <div id="finish-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 p-4"
            role="dialog" aria-modal="true" aria-labelledby="finish-modal-title" tabindex="-1">
            <div class="bg-white card w-full max-w-md p-6">
                <h3 id="finish-modal-title" class="text-2xl font-bold mb-3 text-gray-800"></h3>
                <p id="finish-modal-description" class="text-gray-600 mb-5"></p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <button id="finish-cancel-button" type="button"
                        class="py-2 bg-slate-200 text-slate-800 font-bold rounded-xl hover:bg-slate-300"></button>
                    <button id="finish-confirm-button" type="button"
                        class="py-2 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600"></button>
                </div>
            </div>
        </div>
    </main>

    <script src="app-config.js"></script>

    <script src="result-share.js"></script>
    <script src="question-flow.js"></script>
    <script src="question-view.js"></script>
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>

</html>
