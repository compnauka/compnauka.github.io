<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер роботи з вікнами програм</title>

    <!-- Спільний хедер сайту -->
    <script src="/_shell/site-shell.js" data-back="/#digital-literacy" data-title="Робота з вікнами" data-no-footer defer></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* Сумісність зі спільним хедером (64px зверху) */
        body { display: flex; flex-direction: column; }
        .desktop { flex: 1 1 auto !important; height: auto !important; min-height: 0; }
        .control-panel { top: 84px !important; }
        .window.maximized { height: calc(100vh - 64px) !important; }
    </style>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N8T05K3NGT"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-N8T05K3NGT');
    </script>

</head>

<body>
    <div class="desktop" id="desktop">
        <div class="control-panel">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label" data-translate-key="score">Рахунок</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="level">1</div>
                    <div class="stat-label" data-translate-key="level">Рівень</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label" data-translate-key="streak">Серія</div>
                </div>
            </div>
            <div class="main-controls">
                <button id="startGameBtn" class="btn" data-translate-key="startGame">Почати гру</button>
                <button id="stopGameBtn" class="btn" data-translate-key="stopGame" style="display: none;">Зупинити
                    гру</button>
                <div class="lang-switcher">
                    <button id="lang-uk" class="lang-btn active">UK</button>
                    <button id="lang-en" class="lang-btn">EN</button>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

    </div>

    <script defer src="script.js"></script>
</body>

</html>
