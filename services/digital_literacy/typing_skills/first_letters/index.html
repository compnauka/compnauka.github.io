<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Перші букви 🔤</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="app-header">
        <h1 class="app-title">🔤 Перші букви</h1>
        <div class="controls">
            <div class="lang-switcher" role="group" aria-label="Вибір мови">
                <button id="langUk" class="btn btn--lang btn--lang-active" aria-pressed="true">🇺🇦 УКР</button>
                <button id="langEn" class="btn btn--lang" aria-pressed="false">🇬🇧 ENG</button>
            </div>
            <button id="soundToggle" class="btn btn--toggle" aria-pressed="true" aria-label="Вимкнути звуки">
                <span id="soundIcon" aria-hidden="true">🔊</span>
                <span id="soundText">Звук</span>
            </button>
            <button id="speechToggle" class="btn btn--toggle" aria-pressed="true" aria-label="Вимкнути озвучення літер">
                <span id="speechIcon" aria-hidden="true">🗣️</span>
                <span id="speechText">Голос</span>
            </button>
            <button id="clearBtn" class="btn btn--clear">
                <span aria-hidden="true">🧹</span>
                <span>Очистити</span>
            </button>
        </div>
    </header>

    <main class="app-main">

        <div class="board-wrapper">
            <div class="editor-board" id="dropzone" role="region" aria-label="Дошка для літер"></div>
            <p class="board-hint" id="boardHint" aria-live="polite">
                ✨ Торкнись літери або перетягни її сюди ✨
            </p>
            <p class="status-message" id="statusMessage" role="status" aria-live="polite"></p>
        </div>

        <section class="bank-section" aria-label="Набір літер">
            <div class="letter-bank" id="letters" aria-label="Клавіатура з літерами"></div>
        </section>

    </main>

    <!-- Діалог підтвердження очищення -->
    <div class="overlay" id="clearOverlay" role="dialog" aria-modal="true" aria-label="Підтвердити очищення"
        aria-hidden="true">
        <div class="confirm-box">
            <p class="confirm-emoji">🧹</p>
            <p class="confirm-text">Стерти всі літери?</p>
            <div class="confirm-buttons">
                <button id="confirmYes" class="btn btn--yes">Так! 👍</button>
                <button id="confirmNo" class="btn btn--no">Ні 🙅</button>
            </div>
        </div>
    </div>

    <!-- Контейнер анімаційних ефектів -->
    <div class="sparkles-container" id="sparklesContainer" aria-hidden="true"></div>

    <script src="script.js"></script>
</body>

</html>
