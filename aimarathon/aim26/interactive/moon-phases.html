<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фази Місяця</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #0b1020;
        color: white;
        text-align: center;
        margin: 0;
        padding: 20px;
    }

    canvas {
        background: #000814;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(255,255,255,0.15);
    }

    .controls {
        margin: 20px auto;
        width: min(500px, 90%);
    }

    input[type=range] {
        width: 100%;
    }

    .phase-name {
        font-size: 1.3rem;
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>
<body>
<a href="/aimarathon/aim26/" style="position:fixed;right:12px;bottom:12px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:50px;background:rgba(15,23,42,.85);color:#fff;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;text-decoration:none;box-shadow:0 2px 10px rgba(0,0,0,.45)">⬅ Повернутись на сторінку марафону</a>

<h1>🌙 Інтерактивна демонстрація фаз Місяця</h1>

<canvas id="scene" width="700" height="400"></canvas>

<div class="controls">
    <input type="range" id="angle" min="0" max="360" value="0">
    <div class="phase-name" id="phaseName"></div>
</div>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");
const slider = document.getElementById("angle");
const phaseName = document.getElementById("phaseName");

function getPhase(angle) {
    const phases = [
        "🌑 Молодик",
        "🌒 Зростаючий серп",
        "🌓 Перша чверть",
        "🌔 Зростаючий опуклий",
        "🌕 Повня",
        "🌖 Спадний опуклий",
        "🌗 Остання чверть",
        "🌘 Спадний серп"
    ];

    const index = Math.floor((((angle + 180) % 360) / 45) + 0.5) % 8;
    return phases[index];
}

function draw(angleDeg) {
    const angle = angleDeg * Math.PI / 180;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Сонце
    const sunX = 120;
    const sunY = 200;

    ctx.beginPath();
    ctx.arc(sunX, sunY, 40, 0, Math.PI * 2);
    ctx.fillStyle = "#ffd54a";
    ctx.fill();

    ctx.shadowColor = "#ffd54a";
    ctx.shadowBlur = 30;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Земля
    const earthX = 350;
    const earthY = 200;

    ctx.beginPath();
    ctx.arc(earthX, earthY, 35, 0, Math.PI * 2);
    ctx.fillStyle = "#2d8cff";
    ctx.fill();

    // Орбіта
    ctx.beginPath();
    ctx.arc(earthX, earthY, 120, 0, Math.PI * 2);
    ctx.strokeStyle = "#555";
    ctx.stroke();

    // Місяць на орбіті
    const moonX = earthX + Math.cos(angle) * 120;
    const moonY = earthY + Math.sin(angle) * 120;

    // Освітлення Місяця
    const illumination = Math.cos(angle);

    // Диск Місяця
    ctx.beginPath();
    ctx.arc(moonX, moonY, 28, 0, Math.PI * 2);
    ctx.fillStyle = "#ddd";
    ctx.fill();

    // Тінь
    ctx.save();
    ctx.beginPath();
    ctx.arc(moonX, moonY, 28, 0, Math.PI * 2);
    ctx.clip();

    const shadowOffset = (1 + illumination) * 28;

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.ellipse(
        moonX + shadowOffset,
        moonY,
        28,
        28,
        0,
        0,
        Math.PI * 2
    );
    ctx.fill();

    ctx.restore();

    // Лінія світла від Сонця
    ctx.beginPath();
    ctx.moveTo(sunX + 40, sunY);
    ctx.lineTo(earthX - 35, earthY);
    ctx.strokeStyle = "#ffea9c";
    ctx.stroke();

    phaseName.textContent = getPhase(angleDeg);
}

slider.addEventListener("input", () => {
    draw(Number(slider.value));
});

draw(0);
</script>

</body>
</html>
