<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake MJ Edition</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #111, #000);
  color:white;
  text-align:center;
  font-family:Arial;
}

h1{
  color:#ff3bd4;
  text-shadow:0 0 20px #ff3bd4, 0 0 40px #00f7ff;
  margin:10px;
}

canvas{
  background:#000;
  border:2px solid #ff3bd4;
  box-shadow:0 0 25px #00f7ff;
}

.panel{
  margin:10px;
  font-size:18px;
}

button{
  margin:10px;
  padding:10px 20px;
  border:none;
  background:#ff3bd4;
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 10px #ff3bd4;
}

button:hover{
  background:#00f7ff;
  box-shadow:0 0 15px #00f7ff;
}
</style>
</head>

<body>
<a href="/aimarathon/aim26/" style="position:fixed;right:12px;bottom:12px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:50px;background:rgba(15,23,42,.85);color:#fff;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;text-decoration:none;box-shadow:0 2px 10px rgba(0,0,0,.45)">⬅ Повернутись на сторінку марафону</a>

<h1>🎤 Neon Snake — MJ Style 🎵</h1>

<div class="panel">
Очки: <span id="score">0</span> |
Пауза: SPACE
</div>

<canvas id="game" width="600" height="600"></canvas>
<br>
<button onclick="reset();this.blur()">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
const size = 30;

let snake, food, dx, dy, score, running;

function init(){
  snake = [{x:10,y:10}];
  dx = 1;
  dy = 0;
  score = 0;
  running = true;
  food = spawnFood();
}

function spawnFood(){
  return {
    x: Math.floor(Math.random()*size),
    y: Math.floor(Math.random()*size)
  };
}

document.addEventListener("keydown", e=>{
  // рух
  if((e.key==="w"||e.key==="ArrowUp") && dy!==1){dx=0;dy=-1;}
  if((e.key==="s"||e.key==="ArrowDown") && dy!==-1){dx=0;dy=1;}
  if((e.key==="a"||e.key==="ArrowLeft") && dx!==1){dx=-1;dy=0;}
  if((e.key==="d"||e.key==="ArrowRight") && dx!==-1){dx=1;dy=0;}

  // пауза
  if(e.key===" "){
    running = !running;
  }
});

function move(){
  const head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    food = spawnFood();
  } else {
    snake.pop();
  }
}

function check(){
  const h = snake[0];

  // стіна
  if(h.x<0 || h.y<0 || h.x>=size || h.y>=size){
    gameOver();
    return;
  }

  // себе
  for(let i=1;i<snake.length;i++){
    if(snake[i].x===h.x && snake[i].y===h.y){
      gameOver();
      return;
    }
  }
}

function gameOver(){
  running = false;
  setTimeout(()=>alert("Game Over! Score: " + score),100);
}

function draw(){
  ctx.clearRect(0,0,600,600);

  // їжа
  ctx.fillStyle="#fff";
  ctx.shadowBlur=20;
  ctx.shadowColor="#fff";
  ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);

  // змійка
  ctx.fillStyle="#ff3bd4";
  ctx.shadowBlur=15;
  ctx.shadowColor="#ff3bd4";

  snake.forEach(p=>{
    ctx.fillRect(p.x*grid,p.y*grid,grid-2,grid-2);
  });

  ctx.shadowBlur=0;
}

function loop(){
  if(running){
    move();
    check();
  }

  draw();
  document.getElementById("score").innerText = score;
}

function reset(){
  init();
}

init();
setInterval(loop, 120);
</script>

</body>
</html>
