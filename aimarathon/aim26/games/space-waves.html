<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Space Waves: Impossible Prism</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

canvas {
  display: block;
}

.menu {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #111, black);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

button {
  margin: 6px;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #ffffff20;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #ffffff40;
}

h1 {
  background: linear-gradient(90deg, red, blue, green, yellow);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
</style>
</head>

<body>
<a href="/aimarathon/aim26/" style="position:fixed;right:12px;bottom:12px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:50px;background:rgba(15,23,42,.85);color:#fff;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;text-decoration:none;box-shadow:0 2px 10px rgba(0,0,0,.45)">⬅ Повернутись на сторінку марафону</a>

<div class="menu" id="menu">
  <h1>SPACE WAVES</h1>
  <p>Оберіть приблизний вік</p>

  <button onclick="setMode('kid')">6–10 Easy</button>
  <button onclick="setMode('teen')">11–15 Normal</button>
  <button onclick="setMode('adult')">16–18 Hard</button>
  <button onclick="setMode('impossible')">18+ IMPOSSIBLE 🔥</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let menu = document.getElementById("menu");

let waveY = canvas.height / 2;
let velocity = 0;

let gravity = 0.35;
let lift = -6;

let obstacles = [];
let frame = 0;
let game = false;

let speed = 4;
let spawnRate = 100;
let gap = 180;

let hue = 0;
let shake = 0;

function setMode(mode) {

  if (mode === "kid") {
    speed = 3;
    spawnRate = 120;
    gap = 220;
    gravity = 0.3;
  }

  if (mode === "teen") {
    speed = 5;
    spawnRate = 90;
    gap = 170;
    gravity = 0.35;
  }

  if (mode === "adult") {
    speed = 7;
    spawnRate = 60;
    gap = 140;
    gravity = 0.4;
  }

  if (mode === "impossible") {
    speed = 9;
    spawnRate = 40;
    gap = 110; // майже неможливо
    gravity = 0.45;
  }

  menu.style.display = "none";

  waveY = canvas.height / 2;
  velocity = 0;
  obstacles = [];
  frame = 0;
  hue = 0;

  game = true;
}

function spawn() {
  let top = Math.random() * (canvas.height - gap);

  obstacles.push({
    x: canvas.width,
    top,
    bottom: top + gap
  });
}

function drawWave() {
  ctx.beginPath();
  ctx.arc(120, waveY, 13, 0, Math.PI * 2);
  ctx.fillStyle = `hsl(${hue},100%,60%)`;
  ctx.fill();
}

function drawObs() {
  for (let o of obstacles) {
    ctx.fillStyle = `hsl(${(hue+180)%360},100%,50%)`;

    ctx.fillRect(o.x, 0, 60, o.top);
    ctx.fillRect(o.x, o.bottom, 60, canvas.height);
  }
}

function update() {
  for (let o of obstacles) {
    o.x -= speed;

    if (speed > 7) {
      o.top += Math.sin(frame * 0.05) * 2;
      o.bottom += Math.sin(frame * 0.05) * 2;
    }
  }

  obstacles = obstacles.filter(o => o.x > -100);
}

function check() {
  for (let o of obstacles) {
    if (
      120 + 13 > o.x &&
      120 - 13 < o.x + 60 &&
      (waveY < o.top || waveY > o.bottom)
    ) {
      game = false;
      menu.style.display = "flex";
      alert("💀 GAME OVER");
    }
  }
}

function loop() {

  // 🌪️ stress system
  if (game && speed >= 7) {
    shake = 2;
    ctx.setTransform(1,0,0,1,(Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  } else {
    ctx.setTransform(1,0,0,1,0,0);
  }

  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if (game) {
    frame++;
    hue += 4;

    velocity += gravity;
    waveY += velocity;

    if (frame % spawnRate === 0) spawn();

    update();
    check();
  }

  drawWave();
  drawObs();

  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") velocity = lift;
});

document.addEventListener("click", () => velocity = lift);

loop();
</script>

</body>
</html>
