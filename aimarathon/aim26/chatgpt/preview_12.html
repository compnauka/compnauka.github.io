<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест про Сімейку Дурків</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffcc70, #ff8177);
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
        text-align: center;
        color: #ff5a5f;
    }

    .question {
        margin-bottom: 20px;
    }

    .question h3 {
        margin-bottom: 10px;
    }

    button {
        display: block;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #ff5a5f;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #e14b50;
    }

    #result {
        margin-top: 20px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
    }
</style>
</head>
<body>
<a href="/aimarathon/aim26/" style="position:fixed;right:12px;bottom:12px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:50px;background:rgba(15,23,42,.85);color:#fff;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;text-decoration:none;box-shadow:0 2px 10px rgba(0,0,0,.45)">⬅ Повернутись на сторінку марафону</a>

<div class="container">
    <h1>Тест про Сімейку Дурків 🤪</h1>

    <div class="question">
        <h3>1. Як називається сімейка?</h3>
        <label><input type="radio" name="q1" value="1"> Дурки</label><br>
        <label><input type="radio" name="q1" value="0"> Розумники</label><br>
        <label><input type="radio" name="q1" value="0"> Генії</label>
    </div>

    <div class="question">
        <h3>2. Що вони найчастіше роблять?</h3>
        <label><input type="radio" name="q2" value="0"> Вчаться</label><br>
        <label><input type="radio" name="q2" value="1"> Потрапляють у кумедні ситуації</label><br>
        <label><input type="radio" name="q2" value="0"> Працюють у лабораторії</label>
    </div>

    <div class="question">
        <h3>3. Який настрій у більшості історій?</h3>
        <label><input type="radio" name="q3" value="0"> Сумний</label><br>
        <label><input type="radio" name="q3" value="1"> Веселий</label><br>
        <label><input type="radio" name="q3" value="0"> Страшний</label>
    </div>

    <button onclick="checkTest()">Перевірити результат</button>

    <div id="result"></div>
</div>

<script>
function checkTest() {
    let score = 0;

    const answers = document.querySelectorAll('input[type="radio"]:checked');

    answers.forEach(answer => {
        score += Number(answer.value);
    });

    const result = document.getElementById("result");

    if (score === 3) {
        result.innerHTML = "🏆 Відмінно! Ти справжній експерт із Сімейки Дурків!";
    } else if (score === 2) {
        result.innerHTML = "👍 Непогано! Ти добре знаєш Сімейку Дурків.";
    } else {
        result.innerHTML = "😅 Варто ще трохи познайомитися із Сімейкою Дурків.";
    }
}
</script>

</body>
</html>
