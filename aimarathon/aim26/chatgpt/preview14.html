<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Тест</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        background: #111827;
        padding: 30px;
        border-radius: 15px;
        max-width: 700px;
        width: 100%;
        box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    h1 {
        text-align: center;
        color: #f59e0b;
        margin-bottom: 20px;
    }

    .question {
        margin-bottom: 25px;
    }

    .question h3 {
        margin-bottom: 10px;
    }

    label {
        display: block;
        margin: 8px 0;
        cursor: pointer;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #f59e0b;
        color: black;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #fbbf24;
    }

    #result {
        margin-top: 20px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🎯 Тест по CS2</h1>

    <form id="quiz">

        <div class="question">
            <h3>1. На якому рушії працює CS2?</h3>
            <label><input type="radio" name="q1" value="0"> Unreal Engine 5</label>
            <label><input type="radio" name="q1" value="1"> Source 2</label>
            <label><input type="radio" name="q1" value="0"> Unity</label>
        </div>

        <div class="question">
            <h3>2. Скільки гравців у стандартному матчі 5v5?</h3>
            <label><input type="radio" name="q2" value="1"> 10</label>
            <label><input type="radio" name="q2" value="0"> 8</label>
            <label><input type="radio" name="q2" value="0"> 12</label>
        </div>

        <div class="question">
            <h3>3. Яка карта є класичною картою для закладки бомби?</h3>
            <label><input type="radio" name="q3" value="1"> Dust II</label>
            <label><input type="radio" name="q3" value="0"> Shipment</label>
            <label><input type="radio" name="q3" value="0"> Nuketown</label>
        </div>

        <div class="question">
            <h3>4. Яка зброя найдорожча в грі?</h3>
            <label><input type="radio" name="q4" value="1"> AWP</label>
            <label><input type="radio" name="q4" value="0"> AK-47</label>
            <label><input type="radio" name="q4" value="0"> M4A4</label>
        </div>

        <div class="question">
            <h3>5. Хто розробник CS2?</h3>
            <label><input type="radio" name="q5" value="0"> Riot Games</label>
            <label><input type="radio" name="q5" value="1"> Valve</label>
            <label><input type="radio" name="q5" value="0"> Ubisoft</label>
        </div>

        <button type="button" onclick="checkQuiz()">Перевірити результат</button>
    </form>

    <div id="result"></div>
</div>

<script>
function checkQuiz() {
    let score = 0;

    for (let i = 1; i <= 5; i++) {
        let answer = document.querySelector(`input[name="q${i}"]:checked`);
        if (answer) {
            score += Number(answer.value);
        }
    }

    let text = `Ваш результат: ${score}/5<br>`;

    if(score === 5){
        text += "🏆 Ти справжній профі CS2!";
    } else if(score >= 3){
        text += "🔥 Непогано, але ще є що вивчити!";
    } else {
        text += "🎮 Пограй ще трохи в CS2 і спробуй знову!";
    }

    document.getElementById("result").innerHTML = text;
}
</script>

</body>
</html>
