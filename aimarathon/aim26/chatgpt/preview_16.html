<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: K-Pop Мисливиці на демонів</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff4fd8, #7b5cff);
        color: white;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: rgba(0,0,0,0.3);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
        text-align: center;
    }

    .question {
        margin-bottom: 20px;
    }

    button {
        background: #ff4fd8;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #ff7be7;
    }

    #result {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🎤 Тест: K-Pop Мисливиці на демонів 👹</h1>

    <form id="quiz">

        <div class="question">
            <p>1. Чим займаються головні героїні?</p>
            <label><input type="radio" name="q1" value="1"> Полюють на демонів</label><br>
            <label><input type="radio" name="q1" value="0"> Працюють кухарями</label><br>
            <label><input type="radio" name="q1" value="0"> Навчаються в школі магії</label>
        </div>

        <div class="question">
            <p>2. Який музичний жанр представляють героїні?</p>
            <label><input type="radio" name="q2" value="1"> K-Pop</label><br>
            <label><input type="radio" name="q2" value="0"> Рок</label><br>
            <label><input type="radio" name="q2" value="0"> Джаз</label>
        </div>

        <div class="question">
            <p>3. З ким борються охотниці?</p>
            <label><input type="radio" name="q3" value="1"> Демонами</label><br>
            <label><input type="radio" name="q3" value="0"> Роботами</label><br>
            <label><input type="radio" name="q3" value="0"> Піратами</label>
        </div>

        <div class="question">
            <p>4. Що допомагає героїням у боротьбі?</p>
            <label><input type="radio" name="q4" value="1"> Музика та командна робота</label><br>
            <label><input type="radio" name="q4" value="0"> Лише удача</label><br>
            <label><input type="radio" name="q4" value="0"> Суперкомп'ютер</label>
        </div>

        <div class="question">
            <p>5. Ти фанат K-Pop?</p>
            <label><input type="radio" name="q5" value="1"> Так!</label><br>
            <label><input type="radio" name="q5" value="0"> Ні</label>
        </div>

        <button type="button" onclick="checkQuiz()">Перевірити результат</button>
    </form>

    <div id="result"></div>
</div>

<script>
function checkQuiz() {
    let score = 0;

    for(let i = 1; i <= 5; i++) {
        let answer = document.querySelector(`input[name="q${i}"]:checked`);
        if(answer) {
            score += Number(answer.value);
        }
    }

    let text = "";

    if(score === 5) {
        text = "🏆 Вау! Ти справжній експерт K-Pop Мисливиць на демонів!";
    } else if(score >= 3) {
        text = "⭐ Добрий результат! Ти добре знаєш історію.";
    } else {
        text = "🎵 Час переглянути пригоди охотниць ще раз!";
    }

    document.getElementById("result").innerHTML =
        `Твій результат: ${score}/5<br>${text}`;
}
</script>

</body>
</html>
