<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест про Ліло і Стіч</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4fc3f7, #81d4fa);
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    h1 {
        text-align: center;
        color: #0277bd;
    }

    .question {
        margin-bottom: 20px;
    }

    .question h3 {
        color: #01579b;
    }

    button {
        display: block;
        margin: 20px auto;
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        background: #0288d1;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #0277bd;
    }

    #result {
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        margin-top: 20px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🌺 Тест про Ліло і Стіч 🚀</h1>

    <div class="question">
        <h3>1. Як звати головну дівчинку?</h3>
        <label><input type="radio" name="q1" value="1"> Ліло</label><br>
        <label><input type="radio" name="q1" value="0"> Нані</label><br>
        <label><input type="radio" name="q1" value="0"> Анна</label>
    </div>

    <div class="question">
        <h3>2. Який номер експерименту має Стіч?</h3>
        <label><input type="radio" name="q2" value="0"> 101</label><br>
        <label><input type="radio" name="q2" value="1"> 626</label><br>
        <label><input type="radio" name="q2" value="0"> 404</label>
    </div>

    <div class="question">
        <h3>3. На якому острові живе Ліло?</h3>
        <label><input type="radio" name="q3" value="0"> Мауї</label><br>
        <label><input type="radio" name="q3" value="1"> Кауаї</label><br>
        <label><input type="radio" name="q3" value="0"> Оаху</label>
    </div>

    <div class="question">
        <h3>4. Що означає слово «Охана»?</h3>
        <label><input type="radio" name="q4" value="1"> Сім'я</label><br>
        <label><input type="radio" name="q4" value="0"> Дружба</label><br>
        <label><input type="radio" name="q4" value="0"> Любов</label>
    </div>

    <div class="question">
        <h3>5. Хто створив Стіча?</h3>
        <label><input type="radio" name="q5" value="0"> Джамба</label><br>
        <label><input type="radio" name="q5" value="1"> Доктор Джамба Джукіба</label><br>
        <label><input type="radio" name="q5" value="0"> Пліклі</label>
    </div>

    <button onclick="checkTest()">Перевірити результат</button>

    <div id="result"></div>
</div>

<script>
function checkTest() {
    let score = 0;

    for (let i = 1; i <= 5; i++) {
        let answer = document.querySelector(`input[name="q${i}"]:checked`);
        if (answer) {
            score += Number(answer.value);
        }
    }

    let text = "";

    if (score === 5) {
        text = "🏆 Відмінно! Ти справжній фанат Ліло і Стіча!";
    } else if (score >= 3) {
        text = `😊 Добре! Твій результат: ${score}/5`;
    } else {
        text = `🌴 Результат: ${score}/5. Саме час переглянути мультфільм ще раз!`;
    }

    document.getElementById("result").innerHTML = text;
}
</script>

</body>
</html>
