<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Лісова пісня</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #e8f5e9;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #2e7d32;
    }

    .question {
        margin-bottom: 20px;
    }

    button {
        background: #2e7d32;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #1b5e20;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Тест за твором "Лісова пісня"</h1>

    <form id="quiz">

        <div class="question">
            <p><strong>1. Хто є головною героїнею твору?</strong></p>
            <label><input type="radio" name="q1" value="1"> Мавка</label><br>
            <label><input type="radio" name="q1" value="0"> Килина</label><br>
            <label><input type="radio" name="q1" value="0"> Русалка</label>
        </div>

        <div class="question">
            <p><strong>2. Як звати юнака, якого покохала Мавка?</strong></p>
            <label><input type="radio" name="q2" value="1"> Лукаш</label><br>
            <label><input type="radio" name="q2" value="0"> Лев</label><br>
            <label><input type="radio" name="q2" value="0"> Перелесник</label>
        </div>

        <div class="question">
            <p><strong>3. Хто написав "Лісову пісню"?</strong></p>
            <label><input type="radio" name="q3" value="1"> Леся Українка</label><br>
            <label><input type="radio" name="q3" value="0"> Іван Франко</label><br>
            <label><input type="radio" name="q3" value="0"> Тарас Шевченко</label>
        </div>

        <div class="question">
            <p><strong>4. Де відбуваються події твору?</strong></p>
            <label><input type="radio" name="q4" value="1"> У волинському лісі</label><br>
            <label><input type="radio" name="q4" value="0"> У Києві</label><br>
            <label><input type="radio" name="q4" value="0"> У Карпатах</label>
        </div>

        <div class="question">
            <p><strong>5. Який жанр твору?</strong></p>
            <label><input type="radio" name="q5" value="1"> Драма-феєрія</label><br>
            <label><input type="radio" name="q5" value="0"> Роман</label><br>
            <label><input type="radio" name="q5" value="0"> Поема</label>
        </div>

        <button type="button" onclick="checkQuiz()">Перевірити результат</button>
    </form>

    <div id="result"></div>
</div>

<script>
function checkQuiz() {
    let score = 0;

    for(let i = 1; i <= 5; i++) {
        let answer = document.querySelector('input[name="q'+i+'"]:checked');
        if(answer) {
            score += Number(answer.value);
        }
    }

    document.getElementById("result").innerHTML =
        `Ваш результат: ${score} з 5 балів`;
}
</script>

</body>
</html>
