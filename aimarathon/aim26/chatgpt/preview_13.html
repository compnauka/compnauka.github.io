<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест про Джуді Муді</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f8ff;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #4a4ae6;
    }

    .question {
        margin-bottom: 20px;
    }

    button {
        background: #4a4ae6;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #3636c9;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>
<body>
<a href="/aimarathon/aim26/" style="position:fixed;right:12px;bottom:12px;z-index:99999;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:50px;background:rgba(15,23,42,.85);color:#fff;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;text-decoration:none;box-shadow:0 2px 10px rgba(0,0,0,.45)">⬅ Повернутись на сторінку марафону</a>

<div class="container">
    <h1>📚 Тест про Джуді Муді</h1>

    <form id="quizForm">

        <div class="question">
            <p><b>1. Як звати головну героїню?</b></p>
            <label><input type="radio" name="q1" value="1"> Джуді Муді</label><br>
            <label><input type="radio" name="q1" value="0"> Люсі Локвуд</label><br>
            <label><input type="radio" name="q1" value="0"> Матильда</label>
        </div>

        <div class="question">
            <p><b>2. Як звати молодшого брата Джуді?</b></p>
            <label><input type="radio" name="q2" value="0"> Том</label><br>
            <label><input type="radio" name="q2" value="1"> Стінк</label><br>
            <label><input type="radio" name="q2" value="0"> Сем</label>
        </div>

        <div class="question">
            <p><b>3. У якому класі навчається Джуді на початку серії?</b></p>
            <label><input type="radio" name="q3" value="1"> У третьому</label><br>
            <label><input type="radio" name="q3" value="0"> У першому</label><br>
            <label><input type="radio" name="q3" value="0"> У п'ятому</label>
        </div>

        <div class="question">
            <p><b>4. Який настрій часто має Джуді?</b></p>
            <label><input type="radio" name="q4" value="0"> Завжди серйозний</label><br>
            <label><input type="radio" name="q4" value="1"> Різний та мінливий</label><br>
            <label><input type="radio" name="q4" value="0"> Завжди сумний</label>
        </div>

        <div class="question">
            <p><b>5. Хто написав книги про Джуді Муді?</b></p>
            <label><input type="radio" name="q5" value="1"> Меган МакДоналд</label><br>
            <label><input type="radio" name="q5" value="0"> Джоан Ролінґ</label><br>
            <label><input type="radio" name="q5" value="0"> Астрід Ліндґрен</label>
        </div>

        <button type="button" onclick="checkAnswers()">Перевірити результат</button>
    </form>

    <div id="result"></div>
</div>

<script>
function checkAnswers() {
    let score = 0;
    const answers = document.querySelectorAll('input[type="radio"]:checked');

    answers.forEach(answer => {
        score += Number(answer.value);
    });

    let message = "";

    if (score === 5) {
        message = "🏆 Відмінно! Ти справжній знавець Джуді Муді!";
    } else if (score >= 3) {
        message = "👍 Добре! Ти непогано знаєш історії про Джуді.";
    } else {
        message = "📖 Спробуй ще раз і перечитай книги про Джуді Муді!";
    }

    document.getElementById("result").innerHTML =
        `Твій результат: ${score}/5<br>${message}`;
}
</script>

</body>
</html>
