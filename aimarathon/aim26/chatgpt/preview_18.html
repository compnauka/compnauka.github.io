<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Обід для шпигуна</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f8ff;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #2c3e50;
    }

    .question {
        margin-bottom: 20px;
        padding: 15px;
        background: #eef5ff;
        border-radius: 10px;
    }

    button {
        display: block;
        margin: 20px auto;
        padding: 12px 25px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #3498db;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #2980b9;
    }

    #result {
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        margin-top: 20px;
        color: #27ae60;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Тест за книгою «Обід для шпигуна»</h1>

    <form id="quiz">

        <div class="question">
            <p><strong>1. Хто є головною героїнею книги?</strong></p>
            <label><input type="radio" name="q1" value="1"> Іззі</label><br>
            <label><input type="radio" name="q1" value="0"> Анна</label><br>
            <label><input type="radio" name="q1" value="0"> Софія</label>
        </div>

        <div class="question">
            <p><strong>2. Що викликає підозру у школі?</strong></p>
            <label><input type="radio" name="q2" value="0"> Зникнення книжок</label><br>
            <label><input type="radio" name="q2" value="1"> Поява можливого шпигуна</label><br>
            <label><input type="radio" name="q2" value="0"> Новий директор</label>
        </div>

        <div class="question">
            <p><strong>3. Де відбувається більшість подій?</strong></p>
            <label><input type="radio" name="q3" value="1"> У школі</label><br>
            <label><input type="radio" name="q3" value="0"> У музеї</label><br>
            <label><input type="radio" name="q3" value="0"> У бібліотеці</label>
        </div>

        <div class="question">
            <p><strong>4. Що роблять діти?</strong></p>
            <label><input type="radio" name="q4" value="1"> Проводять власне розслідування</label><br>
            <label><input type="radio" name="q4" value="0"> Готуються до концерту</label><br>
            <label><input type="radio" name="q4" value="0"> Їдуть у табір</label>
        </div>

        <div class="question">
            <p><strong>5. Який жанр книги?</strong></p>
            <label><input type="radio" name="q5" value="0"> Казка</label><br>
            <label><input type="radio" name="q5" value="1"> Детективна пригодницька історія</label><br>
            <label><input type="radio" name="q5" value="0"> Наукова фантастика</label>
        </div>

        <button type="button" onclick="checkQuiz()">Перевірити результат</button>
    </form>

    <div id="result"></div>
</div>

<script>
function checkQuiz() {
    let score = 0;

    for(let i = 1; i <= 5; i++) {
        const answer = document.querySelector('input[name="q'+i+'"]:checked');
        if(answer) {
            score += Number(answer.value);
        }
    }

    document.getElementById("result").innerHTML =
        "Ваш результат: " + score + " із 5 балів!";
}
</script>

</body>
</html>
