<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квіз за книгою «Сім'я Крін»</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #2c3e50;
    }

    .question {
        margin-bottom: 20px;
    }

    .question h3 {
        color: #34495e;
    }

    button {
        display: block;
        width: 100%;
        padding: 12px;
        font-size: 16px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #2980b9;
    }

    #result {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Квіз за книгою «Сім'я Крін»</h1>

    <div class="question">
        <h3>1. Який жанр книги?</h3>
        <label><input type="radio" name="q1" value="1"> Повість</label><br>
        <label><input type="radio" name="q1" value="0"> Детектив</label><br>
        <label><input type="radio" name="q1" value="0"> Наукова фантастика</label>
    </div>

    <div class="question">
        <h3>2. Хто є головними героями твору?</h3>
        <label><input type="radio" name="q2" value="1"> Родина Крін</label><br>
        <label><input type="radio" name="q2" value="0"> Учні школи</label><br>
        <label><input type="radio" name="q2" value="0"> Мандрівники</label>
    </div>

    <div class="question">
        <h3>3. Яка головна тема книги?</h3>
        <label><input type="radio" name="q3" value="1"> Сімейні цінності</label><br>
        <label><input type="radio" name="q3" value="0"> Космічні пригоди</label><br>
        <label><input type="radio" name="q3" value="0"> Спортивні змагання</label>
    </div>

    <div class="question">
        <h3>4. Що найбільше об'єднує героїв?</h3>
        <label><input type="radio" name="q4" value="1"> Підтримка одне одного</label><br>
        <label><input type="radio" name="q4" value="0"> Багатство</label><br>
        <label><input type="radio" name="q4" value="0"> Слава</label>
    </div>

    <button onclick="checkQuiz()">Перевірити результат</button>

    <div id="result"></div>
</div>

<script>
function checkQuiz() {
    let score = 0;

    const answers = document.querySelectorAll('input[type="radio"]:checked');

    answers.forEach(answer => {
        score += Number(answer.value);
    });

    document.getElementById("result").innerHTML =
        `Ваш результат: ${score} з 4 балів`;
}
</script>

</body>
</html>
