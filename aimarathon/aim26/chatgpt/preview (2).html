<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квіз: Леді Баг та Супер Кіт</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff4d6d, #ffb703);
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    h1 {
        color: #e63946;
    }

    .question {
        margin: 20px 0;
        text-align: left;
    }

    button {
        background: #e63946;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #c1121f;
    }

    #result {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
    }

    .ladybug {
        font-size: 50px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="ladybug">🐞😺</div>

    <h1>Квіз: Леді Баг та Супер Кіт</h1>
    <p>Перевір свої знання!</p>

    <form id="quiz">

        <div class="question">
            <p><b>1. Як звати Леді Баг у звичайному житті?</b></p>
            <label><input type="radio" name="q1" value="correct"> Марінетт</label><br>
            <label><input type="radio" name="q1"> Аля</label><br>
            <label><input type="radio" name="q1"> Хлоя</label>
        </div>

        <div class="question">
            <p><b>2. Як звати Супер Кота у звичайному житті?</b></p>
            <label><input type="radio" name="q2"> Ніно</label><br>
            <label><input type="radio" name="q2" value="correct"> Адріан</label><br>
            <label><input type="radio" name="q2"> Лука</label>
        </div>

        <div class="question">
            <p><b>3. Яка тварина символізує Леді Баг?</b></p>
            <label><input type="radio" name="q3"> Метелик</label><br>
            <label><input type="radio" name="q3" value="correct"> Сонечко</label><br>
            <label><input type="radio" name="q3"> Кішка</label>
        </div>

        <div class="question">
            <p><b>4. Яка суперсила є у Леді Баг?</b></p>
            <label><input type="radio" name="q4"> Лазери</label><br>
            <label><input type="radio" name="q4" value="correct"> Чарівний талісман</label><br>
            <label><input type="radio" name="q4"> Невидимість</label>
        </div>

        <div class="question">
            <p><b>5. Де відбуваються події мультсеріалу?</b></p>
            <label><input type="radio" name="q5"> Лондон</label><br>
            <label><input type="radio" name="q5" value="correct"> Париж</label><br>
            <label><input type="radio" name="q5"> Рим</label>
        </div>

        <button type="button" onclick="checkQuiz()">Перевірити результат</button>
    </form>

    <div id="result"></div>
</div>

<script>
function checkQuiz() {
    let score = 0;

    const answers = document.querySelectorAll('input[value="correct"]:checked');

    score = answers.length;

    let message = "";

    if(score === 5){
        message = "🏆 Молодець! У тебе 5 із 5!";
    } else if(score >= 3){
        message = "⭐ Добре! У тебе " + score + " із 5!";
    } else {
        message = "🐞 Спробуй ще раз! У тебе " + score + " із 5.";
    }

    document.getElementById("result").innerHTML = message;
}
</script>

</body>
</html>
