<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квіз: Маляка і Велика Маня</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffe6f2, #e6f7ff);
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    h1 {
        text-align: center;
        color: #d63384;
    }

    .question {
        margin-bottom: 25px;
    }

    .question h3 {
        color: #444;
    }

    button {
        background: #d63384;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #b6256d;
    }

    #result {
        margin-top: 25px;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">
    <h1>📚 Квіз за книгою «Маляка і Велика Маня»</h1>

    <form id="quiz">

        <div class="question">
            <h3>1. Як звали головну героїню?</h3>
            <label><input type="radio" name="q1" value="1"> Маляка</label><br>
            <label><input type="radio" name="q1" value="0"> Марійка</label><br>
            <label><input type="radio" name="q1" value="0"> Оленка</label>
        </div>

        <div class="question">
            <h3>2. Хто така Велика Маня?</h3>
            <label><input type="radio" name="q2" value="1"> Подруга Маляки</label><br>
            <label><input type="radio" name="q2" value="0"> Учителька</label><br>
            <label><input type="radio" name="q2" value="0"> Сусідка</label>
        </div>

        <div class="question">
            <h3>3. Який настрій переважає у книзі?</h3>
            <label><input type="radio" name="q3" value="0"> Сумний</label><br>
            <label><input type="radio" name="q3" value="1"> Веселий та пригодницький</label><br>
            <label><input type="radio" name="q3" value="0"> Страшний</label>
        </div>

        <div class="question">
            <h3>4. Про що вчить книга?</h3>
            <label><input type="radio" name="q4" value="1"> Дружбі та взаємодопомозі</label><br>
            <label><input type="radio" name="q4" value="0"> Лише математиці</label><br>
            <label><input type="radio" name="q4" value="0"> Керуванню автомобілем</label>
        </div>

        <div class="question">
            <h3>5. Чи сподобалася тобі книга?</h3>
            <label><input type="radio" name="q5" value="1"> Так!</label><br>
            <label><input type="radio" name="q5" value="0"> Не дуже</label>
        </div>

        <button type="button" onclick="checkQuiz()">Перевірити результат</button>
    </form>

    <div id="result"></div>
</div>

<script>
function checkQuiz() {
    let score = 0;
    const answers = document.querySelectorAll('input[type="radio"]:checked');

    answers.forEach(answer => {
        score += Number(answer.value);
    });

    const result = document.getElementById("result");

    if(score === 5){
        result.innerHTML = "🌟 Відмінно! Ти справжній знавець книги!";
    } else if(score >= 3){
        result.innerHTML = "😊 Добре! Ти уважно читав(ла) книгу.";
    } else {
        result.innerHTML = "📖 Спробуй перечитати книгу та пройти квіз ще раз.";
    }
}
</script>

</body>
</html>
