<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Smoke</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    .pass { color: #166534; }
    .fail { color: #991b1b; }
  </style>
</head>
<body>
  <h1>Browser smoke</h1>
  <pre id="output">Running...</pre>
  <script type="module">
    const output = document.getElementById("output");

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }

    async function setViewport(win, width, height) {
      if (typeof win.resizeTo === "function") {
        win.resizeTo(width, height);
      }
      await new Promise((resolve) => window.setTimeout(resolve, 250));
    }

    function assertNoHorizontalOverflow(doc, message) {
      const root = doc.documentElement;
      const overflow = root.scrollWidth - root.clientWidth;
      assert(overflow <= 2, `${message} Overflow: ${overflow}px.`);
    }

    function isHidden(element, win) {
      if (!element) return true;
      const style = win.getComputedStyle(element);
      return style.display === "none" || style.visibility === "hidden";
    }

    function assertLessonHydrated(doc, expectedTitle, expectedGoalSnippet, activitySelector) {
      const title = doc.getElementById("lesson-title")?.textContent?.trim() || "";
      const hook = doc.getElementById("lesson-student-hook")?.textContent?.trim() || "";
      const goal = doc.getElementById("lesson-goal")?.textContent?.trim() || "";
      const objectives = Array.from(doc.querySelectorAll("#learning-objectives li"))
        .map((item) => item.textContent.trim())
        .filter(Boolean);
      const sectionsCount = doc.querySelectorAll("#sections-container > *").length;

      assert(title.includes(expectedTitle), `Неочікуваний заголовок уроку: ${expectedTitle}.`);
      assert(hook.length > 20, `Student hook не промалювався для уроку "${expectedTitle}".`);
      assert(goal.includes(expectedGoalSnippet), `Мета уроку не промалювалася для "${expectedTitle}".`);
      assert(objectives.length >= 3, `Очікувані результати не промалювалися для "${expectedTitle}".`);
      assert(sectionsCount >= 2, `Змістові секції не промалювалися для "${expectedTitle}".`);
      assert(doc.querySelector(activitySelector), `Не знайдено очікувану активність для "${expectedTitle}".`);
    }

    function assertTextFillActivity(doc, activityId, expectedCount, expectedPlaceholderSnippet) {
      const activity = doc.querySelector(`[data-activity-id='${activityId}']`);
      assert(activity, `Не знайдено activity ${activityId}.`);

      const inputs = Array.from(activity.querySelectorAll(`[data-fill-text-id='${activityId}']`));
      assert(inputs.length === expectedCount, `Очікувалося ${expectedCount} text fill inputs для ${activityId}, але знайдено ${inputs.length}.`);
      assert(inputs.every((input) => input.tagName === "INPUT"), `${activityId} має рендеритися через text input.`);

      const firstPlaceholder = inputs[0]?.getAttribute("placeholder") || "";
      assert(firstPlaceholder.includes(expectedPlaceholderSnippet), `У ${activityId} перший placeholder має містити "${expectedPlaceholderSnippet}".`);
    }

    function assertSelectFillActivity(doc, activityId, expectedCount) {
      const activity = doc.querySelector(`[data-activity-id='${activityId}']`);
      assert(activity, `Не знайдено activity ${activityId}.`);

      const selects = Array.from(activity.querySelectorAll(`[data-fill-select-id='${activityId}']`));
      assert(selects.length === expectedCount, `Очікувалося ${expectedCount} select fill controls для ${activityId}, але знайдено ${selects.length}.`);
      assert(selects.every((select) => select.tagName === "SELECT"), `${activityId} має рендеритися через select для вправи з вибором.`);
      assert(selects[0]?.querySelectorAll("option").length >= 3, `${activityId} має містити варіанти відповіді у select.`);
    }

    try {
      const landingWindow = window.open("../index.html", "landing-smoke");
      assert(landingWindow, "Не вдалося відкрити головну сторінку підручника.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження головної сторінки.")), 10000);
        landingWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      await setViewport(landingWindow, 390, 844);
      assertNoHorizontalOverflow(landingWindow.document, "Головна сторінка не має створювати горизонтальний скрол на мобільному.");

      const lessonWindow = window.open("../m1-08-simple-tables.html", "lesson-smoke");
      assert(lessonWindow, "Не вдалося відкрити сторінку уроку.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку.")), 10000);
        lessonWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const doc = lessonWindow.document;
      await setViewport(lessonWindow, 390, 844);
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertNoHorizontalOverflow(doc, "Сторінка уроку не має створювати горизонтальний скрол на мобільному.");

      assert(doc.querySelector("[data-activity-id='table-read']"), "Не знайдено activity table-read.");
      assert(doc.querySelector("#lesson-coverage"), "Не знайдено teacher coverage block.");

      const coverage = doc.querySelector("#lesson-coverage");
      assert(isHidden(coverage, lessonWindow), "У student mode coverage має бути прихований.");

      const teacherButton = doc.getElementById("mode-teacher");
      assert(teacherButton, "Не знайдено кнопку режиму вчителя.");
      teacherButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 200));
      assert(!isHidden(coverage, lessonWindow), "У teacher mode coverage має бути видимий.");
      assert(coverage.textContent.includes("2 ІФО 1.2"), "У coverage не видно очікуваного коду результату.");

      const studentButton = doc.getElementById("mode-student");
      assert(studentButton, "Не знайдено кнопку режиму учня.");
      studentButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 200));
      assert(isHidden(coverage, lessonWindow), "Після повернення в student mode coverage має знову сховатися.");

      const clickTrainerWindow = window.open("../m2-03-computer-parts.html", "click-trainer-smoke");
      assert(clickTrainerWindow, "Не вдалося відкрити урок із click-trainer.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку з click-trainer.")), 10000);
        clickTrainerWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const clickDoc = clickTrainerWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));

      const clickTrainer = clickDoc.querySelector("[data-activity-id='click-trainer']");
      assert(clickTrainer, "Не знайдено activity click-trainer.");

      const scoreBefore = clickTrainer.querySelector(".task-score")?.textContent || "";
      assert(scoreBefore.includes("0/4"), "Click trainer має починатися з рахунку 0/4.");

      const correctButton = clickDoc.querySelector("[data-click-trainer-option='click-trainer'][data-option-index='0']");
      assert(correctButton, "Не знайдено кнопку варіанта у click-trainer.");
      correctButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 250));

      const clickTrainerAfter = clickDoc.querySelector("[data-activity-id='click-trainer']");
      const scoreAfter = clickTrainerAfter.querySelector(".task-score")?.textContent || "";
      const roundLabel = clickTrainerAfter.querySelector(".click-trainer__round")?.textContent || "";

      assert(scoreAfter.includes("1/4"), "Після правильної відповіді рахунок click-trainer має стати 1/4.");
      assert(roundLabel.includes("Раунд 2"), "Після правильної відповіді click-trainer має перейти до другого раунду.");

      const traceWindow = window.open("../m1-01-info-types.html", "trace-smoke");
      assert(traceWindow, "Не вдалося відкрити урок із trace-contour.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку з trace-contour.")), 10000);
        traceWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const traceDoc = traceWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));

      const traceActivity = traceDoc.querySelector("[data-activity-id='trace-contour']");
      assert(traceActivity, "Не знайдено activity trace-contour.");

      const traceCanvas = traceDoc.querySelector(".trace-canvas");
      assert(traceCanvas, "У trace-contour має бути canvas для обведення.");

      const traceBadge = traceActivity.querySelector(".task-badge")?.textContent || "";
      assert(traceBadge.includes("Завдання 1"), "Trace-contour має бути першим завданням у пілотному уроці.");

      const keyTrainerWindow = window.open("../m4-03-sign-your-work.html", "key-trainer-smoke");
      assert(keyTrainerWindow, "Не вдалося відкрити урок із key-trainer.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку з key-trainer.")), 10000);
        keyTrainerWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const keyDoc = keyTrainerWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        keyDoc,
        "Підписуємо свою роботу",
        "Навчити дітей підписувати",
        "[data-activity-id='key-trainer']"
      );

      const keyActivity = keyDoc.querySelector("[data-activity-id='key-trainer']");
      assert(keyActivity, "Не знайдено activity key-trainer.");

      const keyScoreBefore = keyActivity.querySelector(".task-score")?.textContent || "";
      assert(keyScoreBefore.includes("0/3"), "Key trainer має починатися з рахунку 0/3.");

      const keySurface = keyActivity.querySelector("[data-key-trainer-surface='key-trainer']");
      assert(keySurface, "У key-trainer має бути активна область для натискання клавіш.");
      keySurface.focus();
      keySurface.dispatchEvent(new KeyboardEvent("keydown", { key: "О", bubbles: true }));

      await new Promise((resolve) => window.setTimeout(resolve, 250));

      const keyActivityAfter = keyDoc.querySelector("[data-activity-id='key-trainer']");
      const keyScoreAfter = keyActivityAfter.querySelector(".task-score")?.textContent || "";
      const keyRoundLabel = keyActivityAfter.querySelector(".key-trainer__round")?.textContent || "";

      assert(keyScoreAfter.includes("1/3"), "Після правильної клавіші рахунок key-trainer має стати 1/3.");
      assert(keyRoundLabel.includes("Раунд 2"), "Після правильної клавіші key-trainer має перейти до другого раунду.");

      const codingWindow = window.open("../m1-05-info-history-coding.html", "coding-key-trainer-smoke");
      assert(codingWindow, "Не вдалося відкрити урок кодування.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку кодування.")), 10000);
        codingWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const codingDoc = codingWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));

      const codingKeyTrainer = codingDoc.querySelector("[data-activity-id='key-trainer']");
      assert(codingKeyTrainer, "У уроці кодування має бути вторинне використання key-trainer.");

      const codingBadge = codingKeyTrainer.querySelector(".task-badge")?.textContent || "";
      assert(codingBadge.includes("Завдання 1"), "У уроці кодування key-trainer має бути першою активністю.");

      const productWindow = window.open("../m4-02-simple-info-product.html", "product-key-trainer-smoke");
      assert(productWindow, "Не вдалося відкрити урок про простий інформаційний продукт.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про простий продукт.")), 10000);
        productWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const productDoc = productWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        productDoc,
        "Створюємо простий інформаційний продукт",
        "Навчити дітей створювати",
        "[data-activity-id='key-trainer']"
      );

      const productKeyTrainer = productDoc.querySelector("[data-activity-id='key-trainer']");
      assert(productKeyTrainer, "У уроці про простий продукт має бути ще одне використання key-trainer.");

      const productScore = productKeyTrainer.querySelector(".task-score")?.textContent || "";
      assert(productScore.includes("0/4"), "У уроці про простий продукт key-trainer має починатися з рахунку 0/4.");

      const productEmbeddedTool = productDoc.querySelector("[data-activity-id='embedded-tool']");
      assert(productEmbeddedTool, "У уроці про простий продукт має бути embedded-tool.");

      const productEmbeddedFrame = productDoc.querySelector("[data-embedded-frame='embedded-tool']");
      assert(productEmbeddedFrame, "У уроці про простий продукт має одразу відкриватися майстерня продукту.");

      await new Promise((resolve) => {
        const waitForFrame = () => {
          if (productEmbeddedFrame.contentWindow?.document?.readyState === "complete") {
            resolve();
            return;
          }
          window.setTimeout(waitForFrame, 150);
        };
        waitForFrame();
      });

      const productToolDoc = productEmbeddedFrame.contentWindow.document;
      const productTextInput = productToolDoc.getElementById("product-text");
      const productFinishButton = productToolDoc.getElementById("finish-product");
      assert(productTextInput, "У майстерні продукту має бути поле короткого тексту.");
      assert(productFinishButton, "У майстерні продукту має бути кнопка завершення.");

      productTextInput.value = "Чекаємо на свято";
      productTextInput.dispatchEvent(new Event("input", { bubbles: true }));
      productFinishButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 350));

      const productEmbeddedToolAfter = productDoc.querySelector("[data-activity-id='embedded-tool']");
      const productEmbeddedScoreAfter = productEmbeddedToolAfter.querySelector(".task-score")?.textContent || "";
      assert(productEmbeddedScoreAfter.includes("1/1"), "Після завершення майстерні продукту embedded-tool має стати 1/1.");

      const drawWindow = window.open("../m4-01-draw-in-program.html", "embedded-tool-smoke");
      assert(drawWindow, "Не вдалося відкрити урок малювання.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку малювання.")), 10000);
        drawWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const drawDoc = drawWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 500));
      assertLessonHydrated(
        drawDoc,
        "Малюємо у програмі",
        "Навчити дітей розуміти",
        "[data-activity-id='embedded-tool']"
      );

      const embeddedTool = drawDoc.querySelector("[data-activity-id='embedded-tool']");
      assert(embeddedTool, "У уроці малювання має бути activity embedded-tool.");

      const embeddedScoreBefore = embeddedTool.querySelector(".task-score")?.textContent || "";
      assert(embeddedScoreBefore.includes("0/1"), "Embedded-tool має починатися з рахунку 0/1.");

      const embeddedFrame = drawDoc.querySelector("[data-embedded-frame='embedded-tool']");
      assert(embeddedFrame, "Embedded-tool має одразу відкривати вбудовану майстерню.");

      await new Promise((resolve) => {
        const waitForFrame = () => {
          if (embeddedFrame.contentWindow?.document?.readyState === "complete") {
            resolve();
            return;
          }
          window.setTimeout(waitForFrame, 150);
        };
        waitForFrame();
      });

      const toolDoc = embeddedFrame.contentWindow.document;
      const finishDrawing = toolDoc.getElementById("finish-drawing");
      assert(finishDrawing, "У локальній майстерні має бути кнопка завершення.");

      const toolCanvas = toolDoc.getElementById("draw-surface");
      assert(toolCanvas, "У локальній майстерні має бути canvas.");

      toolCanvas.dispatchEvent(new PointerEvent("pointerdown", { bubbles: true, clientX: 80, clientY: 80 }));
      toolCanvas.dispatchEvent(new PointerEvent("pointermove", { bubbles: true, clientX: 140, clientY: 120 }));
      toolCanvas.dispatchEvent(new PointerEvent("pointerup", { bubbles: true, clientX: 140, clientY: 120 }));
      finishDrawing.click();

      await new Promise((resolve) => window.setTimeout(resolve, 350));

      const embeddedToolAfter = drawDoc.querySelector("[data-activity-id='embedded-tool']");
      const embeddedScoreAfter = embeddedToolAfter.querySelector(".task-score")?.textContent || "";
      assert(embeddedScoreAfter.includes("1/1"), "Після завершення майстерні embedded-tool має стати 1/1.");

      const searchWindow = window.open("../m5-02-search-online.html", "search-online-smoke");
      assert(searchWindow, "Не вдалося відкрити урок про онлайн-пошук.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про онлайн-пошук.")), 10000);
        searchWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const searchDoc = searchWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        searchDoc,
        "Шукаємо інформацію онлайн",
        "Навчити дітей робити простий онлайн-пошук",
        "[data-activity-id='fill']"
      );
      assertTextFillActivity(searchDoc, "fill", 3, "кіт");

      const searchEmbeddedTool = searchDoc.querySelector("[data-activity-id='embedded-tool']");
      assert(searchEmbeddedTool, "У уроці про онлайн-пошук має бути embedded-tool.");

      const searchFrame = searchDoc.querySelector("[data-embedded-frame='embedded-tool']");
      assert(searchFrame, "У уроці про онлайн-пошук має одразу відкриватися майстерня пошуку.");

      await new Promise((resolve) => {
        const waitForFrame = () => {
          if (searchFrame.contentWindow?.document?.readyState === "complete") {
            resolve();
            return;
          }
          window.setTimeout(waitForFrame, 150);
        };
        waitForFrame();
      });

      const searchToolDoc = searchFrame.contentWindow.document;
      const searchGoal = searchToolDoc.getElementById("search-goal");
      const searchQuery = searchToolDoc.getElementById("search-query");
      const searchFinishButton = searchToolDoc.getElementById("finish-search");
      assert(searchGoal, "У майстерні пошуку має бути вибір мети.");
      assert(searchQuery, "У майстерні пошуку має бути вибір запиту.");
      assert(searchFinishButton, "У майстерні пошуку має бути кнопка завершення.");

      searchGoal.value = "weather";
      searchGoal.dispatchEvent(new Event("change", { bubbles: true }));
      searchQuery.value = "погода";
      searchQuery.dispatchEvent(new Event("change", { bubbles: true }));

      const weatherCard = searchToolDoc.querySelector("[data-result-id='weather-today']");
      assert(weatherCard, "У майстерні пошуку має бути правильний результат для погоди.");
      weatherCard.click();
      searchFinishButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 350));

      const searchEmbeddedToolAfter = searchDoc.querySelector("[data-activity-id='embedded-tool']");
      const searchEmbeddedScoreAfter = searchEmbeddedToolAfter.querySelector(".task-score")?.textContent || "";
      assert(searchEmbeddedScoreAfter.includes("1/1"), "Після завершення майстерні пошуку embedded-tool має стати 1/1.");

      const algorithmWindow = window.open("../m3-05-algorithm-representation.html", "algorithm-fill-smoke");
      assert(algorithmWindow, "Не вдалося відкрити урок про запис алгоритму.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про запис алгоритму.")), 10000);
        algorithmWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const algorithmDoc = algorithmWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        algorithmDoc,
        "Як записати алгоритм",
        "Навчити дітей бачити різні прості способи подання алгоритму",
        "[data-activity-id='fill']"
      );
      assertSelectFillActivity(algorithmDoc, "fill", 4);

      const kindWindow = window.open("../m5-04-kind-online.html", "kind-online-smoke");
      assert(kindWindow, "Не вдалося відкрити урок про чемне онлайн-спілкування.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про чемне онлайн-спілкування.")), 10000);
        kindWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const kindDoc = kindWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        kindDoc,
        "Спілкуємося чемно онлайн",
        "Навчити дітей чемно спілкуватися",
        "[data-activity-id='classify']"
      );
      assertTextFillActivity(kindDoc, "fill", 3, "Будь ласка");

      const signWindow = window.open("../m4-03-sign-your-work.html", "sign-fill-smoke");
      assert(signWindow, "Не вдалося відкрити урок про підпис робіт.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про підпис робіт.")), 10000);
        signWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const signDoc = signWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        signDoc,
        "Підписуємо свою роботу",
        "Навчити дітей підписувати",
        "[data-activity-id='fill']"
      );
      assertTextFillActivity(signDoc, "fill", 3, "Малюнок Олі");

      const signatureEmbeddedTool = signDoc.querySelector("[data-activity-id='embedded-tool']");
      assert(signatureEmbeddedTool, "У уроці про підпис робіт має бути embedded-tool.");

      const signatureFrame = signDoc.querySelector("[data-embedded-frame='embedded-tool']");
      assert(signatureFrame, "У уроці про підпис робіт має одразу відкриватися майстерня підпису.");

      await new Promise((resolve) => {
        const waitForFrame = () => {
          if (signatureFrame.contentWindow?.document?.readyState === "complete") {
            resolve();
            return;
          }
          window.setTimeout(waitForFrame, 150);
        };
        waitForFrame();
      });

      const signatureToolDoc = signatureFrame.contentWindow.document;
      const authorInput = signatureToolDoc.getElementById("author-name");
      const signatureFinishButton = signatureToolDoc.getElementById("finish-signature");
      assert(authorInput, "У майстерні підпису має бути поле імені автора.");
      assert(signatureFinishButton, "У майстерні підпису має бути кнопка завершення.");

      authorInput.value = "Марійка";
      authorInput.dispatchEvent(new Event("input", { bubbles: true }));
      signatureFinishButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 350));

      const signatureEmbeddedToolAfter = signDoc.querySelector("[data-activity-id='embedded-tool']");
      const signatureEmbeddedScoreAfter = signatureEmbeddedToolAfter.querySelector(".task-score")?.textContent || "";
      assert(signatureEmbeddedScoreAfter.includes("1/1"), "Після завершення майстерні підпису embedded-tool має стати 1/1.");

      const teamworkWindow = window.open("../m4-04-work-alone-together.html", "teamwork-embedded-smoke");
      assert(teamworkWindow, "Не вдалося відкрити урок про спільну роботу.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про спільну роботу.")), 10000);
        teamworkWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const teamworkDoc = teamworkWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 350));
      assertLessonHydrated(
        teamworkDoc,
        "Працюємо самостійно і разом",
        "Навчити дітей розрізняти самостійну і спільну роботу",
        "[data-activity-id='embedded-tool']"
      );

      const teamworkEmbeddedTool = teamworkDoc.querySelector("[data-activity-id='embedded-tool']");
      assert(teamworkEmbeddedTool, "У уроці про спільну роботу має бути embedded-tool.");

      const teamworkFrame = teamworkDoc.querySelector("[data-embedded-frame='embedded-tool']");
      assert(teamworkFrame, "У уроці про спільну роботу має одразу відкриватися майстерня співпраці.");

      await new Promise((resolve) => {
        const waitForFrame = () => {
          if (teamworkFrame.contentWindow?.document?.readyState === "complete") {
            resolve();
            return;
          }
          window.setTimeout(waitForFrame, 150);
        };
        waitForFrame();
      });

      const teamworkToolDoc = teamworkFrame.contentWindow.document;
      const teamworkRole = teamworkToolDoc.getElementById("team-role");
      const teamworkFinishButton = teamworkToolDoc.getElementById("finish-team");
      assert(teamworkRole, "У майстерні співпраці має бути вибір ролі.");
      assert(teamworkFinishButton, "У майстерні співпраці має бути кнопка завершення.");

      teamworkRole.value = "пишу слова";
      teamworkRole.dispatchEvent(new Event("change", { bubbles: true }));
      teamworkFinishButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 350));

      const teamworkEmbeddedToolAfter = teamworkDoc.querySelector("[data-activity-id='embedded-tool']");
      const teamworkEmbeddedScoreAfter = teamworkEmbeddedToolAfter.querySelector(".task-score")?.textContent || "";
      assert(teamworkEmbeddedScoreAfter.includes("1/1"), "Після завершення майстерні співпраці embedded-tool має стати 1/1.");

      output.className = "pass";
      output.textContent = "PASS";
      landingWindow.close();
      lessonWindow.close();
      clickTrainerWindow.close();
      traceWindow.close();
      keyTrainerWindow.close();
      codingWindow.close();
      productWindow.close();
      drawWindow.close();
      searchWindow.close();
      algorithmWindow.close();
      kindWindow.close();
      signWindow.close();
      teamworkWindow.close();
    } catch (error) {
      output.className = "fail";
      output.textContent = `FAIL\n${error.message}`;
    }
  </script>
</body>
</html>
