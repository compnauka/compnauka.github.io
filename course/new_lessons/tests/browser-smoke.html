<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Smoke</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    .pass { color: #166534; }
    .fail { color: #991b1b; }
  </style>
</head>
<body>
  <h1>Browser smoke</h1>
  <pre id="output">Running...</pre>
  <script type="module">
    const output = document.getElementById("output");

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }

    function isHidden(element, win) {
      if (!element) return true;
      const style = win.getComputedStyle(element);
      return style.display === "none" || style.visibility === "hidden";
    }

    function assertLessonHydrated(doc, expectedTitle, expectedGoalSnippet, activitySelector) {
      const title = doc.getElementById("lesson-title")?.textContent?.trim() || "";
      const hook = doc.getElementById("lesson-student-hook")?.textContent?.trim() || "";
      const goal = doc.getElementById("lesson-goal")?.textContent?.trim() || "";
      const objectives = Array.from(doc.querySelectorAll("#learning-objectives li"))
        .map((item) => item.textContent.trim())
        .filter(Boolean);
      const sectionsCount = doc.querySelectorAll("#sections-container > *").length;

      assert(title.includes(expectedTitle), `Неочікуваний заголовок уроку: ${expectedTitle}.`);
      assert(hook.length > 20, `Student hook не промалювався для уроку "${expectedTitle}".`);
      assert(goal.includes(expectedGoalSnippet), `Мета уроку не промалювалася для "${expectedTitle}".`);
      assert(objectives.length >= 3, `Очікувані результати не промалювалися для "${expectedTitle}".`);
      assert(sectionsCount >= 2, `Змістові секції не промалювалися для "${expectedTitle}".`);
      assert(doc.querySelector(activitySelector), `Не знайдено очікувану активність для "${expectedTitle}".`);
    }

    try {
      const lessonWindow = window.open("../m1-08-simple-tables.html", "lesson-smoke");
      assert(lessonWindow, "Не вдалося відкрити сторінку уроку.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку.")), 10000);
        lessonWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const doc = lessonWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));

      assert(doc.querySelector("[data-activity-id='table-read']"), "Не знайдено activity table-read.");
      assert(doc.querySelector("#lesson-coverage"), "Не знайдено teacher coverage block.");

      const coverage = doc.querySelector("#lesson-coverage");
      assert(isHidden(coverage, lessonWindow), "У student mode coverage має бути прихований.");

      const teacherButton = doc.getElementById("mode-teacher");
      assert(teacherButton, "Не знайдено кнопку режиму вчителя.");
      teacherButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 200));
      assert(!isHidden(coverage, lessonWindow), "У teacher mode coverage має бути видимий.");
      assert(coverage.textContent.includes("2 ІФО 1.2"), "У coverage не видно очікуваного коду результату.");

      const studentButton = doc.getElementById("mode-student");
      assert(studentButton, "Не знайдено кнопку режиму учня.");
      studentButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 200));
      assert(isHidden(coverage, lessonWindow), "Після повернення в student mode coverage має знову сховатися.");

      const clickTrainerWindow = window.open("../m2-03-computer-parts.html", "click-trainer-smoke");
      assert(clickTrainerWindow, "Не вдалося відкрити урок із click-trainer.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку з click-trainer.")), 10000);
        clickTrainerWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const clickDoc = clickTrainerWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));

      const clickTrainer = clickDoc.querySelector("[data-activity-id='click-trainer']");
      assert(clickTrainer, "Не знайдено activity click-trainer.");

      const scoreBefore = clickTrainer.querySelector(".task-score")?.textContent || "";
      assert(scoreBefore.includes("0/4"), "Click trainer має починатися з рахунку 0/4.");

      const correctButton = clickDoc.querySelector("[data-click-trainer-option='click-trainer'][data-option-index='0']");
      assert(correctButton, "Не знайдено кнопку варіанта у click-trainer.");
      correctButton.click();

      await new Promise((resolve) => window.setTimeout(resolve, 250));

      const clickTrainerAfter = clickDoc.querySelector("[data-activity-id='click-trainer']");
      const scoreAfter = clickTrainerAfter.querySelector(".task-score")?.textContent || "";
      const roundLabel = clickTrainerAfter.querySelector(".click-trainer__round")?.textContent || "";

      assert(scoreAfter.includes("1/4"), "Після правильної відповіді рахунок click-trainer має стати 1/4.");
      assert(roundLabel.includes("Раунд 2"), "Після правильної відповіді click-trainer має перейти до другого раунду.");

      const traceWindow = window.open("../m1-01-info-types.html", "trace-smoke");
      assert(traceWindow, "Не вдалося відкрити урок із trace-contour.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку з trace-contour.")), 10000);
        traceWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const traceDoc = traceWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));

      const traceActivity = traceDoc.querySelector("[data-activity-id='trace-contour']");
      assert(traceActivity, "Не знайдено activity trace-contour.");

      const traceCanvas = traceDoc.querySelector(".trace-canvas");
      assert(traceCanvas, "У trace-contour має бути canvas для обведення.");

      const traceBadge = traceActivity.querySelector(".task-badge")?.textContent || "";
      assert(traceBadge.includes("Завдання 1"), "Trace-contour має бути першим завданням у пілотному уроці.");

      const keyTrainerWindow = window.open("../m4-03-sign-your-work.html", "key-trainer-smoke");
      assert(keyTrainerWindow, "Не вдалося відкрити урок із key-trainer.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку з key-trainer.")), 10000);
        keyTrainerWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const keyDoc = keyTrainerWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        keyDoc,
        "Підписуємо свою роботу",
        "Навчити дітей підписувати",
        "[data-activity-id='key-trainer']"
      );

      const keyActivity = keyDoc.querySelector("[data-activity-id='key-trainer']");
      assert(keyActivity, "Не знайдено activity key-trainer.");

      const keyScoreBefore = keyActivity.querySelector(".task-score")?.textContent || "";
      assert(keyScoreBefore.includes("0/3"), "Key trainer має починатися з рахунку 0/3.");

      const keySurface = keyActivity.querySelector("[data-key-trainer-surface='key-trainer']");
      assert(keySurface, "У key-trainer має бути активна область для натискання клавіш.");
      keySurface.focus();
      keySurface.dispatchEvent(new KeyboardEvent("keydown", { key: "О", bubbles: true }));

      await new Promise((resolve) => window.setTimeout(resolve, 250));

      const keyActivityAfter = keyDoc.querySelector("[data-activity-id='key-trainer']");
      const keyScoreAfter = keyActivityAfter.querySelector(".task-score")?.textContent || "";
      const keyRoundLabel = keyActivityAfter.querySelector(".key-trainer__round")?.textContent || "";

      assert(keyScoreAfter.includes("1/3"), "Після правильної клавіші рахунок key-trainer має стати 1/3.");
      assert(keyRoundLabel.includes("Раунд 2"), "Після правильної клавіші key-trainer має перейти до другого раунду.");

      const codingWindow = window.open("../m1-05-info-history-coding.html", "coding-key-trainer-smoke");
      assert(codingWindow, "Не вдалося відкрити урок кодування.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку кодування.")), 10000);
        codingWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const codingDoc = codingWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));

      const codingKeyTrainer = codingDoc.querySelector("[data-activity-id='key-trainer']");
      assert(codingKeyTrainer, "У уроці кодування має бути вторинне використання key-trainer.");

      const codingBadge = codingKeyTrainer.querySelector(".task-badge")?.textContent || "";
      assert(codingBadge.includes("Завдання 1"), "У уроці кодування key-trainer має бути першою активністю.");

      const productWindow = window.open("../m4-02-simple-info-product.html", "product-key-trainer-smoke");
      assert(productWindow, "Не вдалося відкрити урок про простий інформаційний продукт.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про простий продукт.")), 10000);
        productWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const productDoc = productWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        productDoc,
        "Створюємо простий інформаційний продукт",
        "Навчити дітей створювати",
        "[data-activity-id='key-trainer']"
      );

      const productKeyTrainer = productDoc.querySelector("[data-activity-id='key-trainer']");
      assert(productKeyTrainer, "У уроці про простий продукт має бути ще одне використання key-trainer.");

      const productScore = productKeyTrainer.querySelector(".task-score")?.textContent || "";
      assert(productScore.includes("0/4"), "У уроці про простий продукт key-trainer має починатися з рахунку 0/4.");

      const searchWindow = window.open("../m5-02-search-online.html", "search-online-smoke");
      assert(searchWindow, "Не вдалося відкрити урок про онлайн-пошук.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про онлайн-пошук.")), 10000);
        searchWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const searchDoc = searchWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        searchDoc,
        "Шукаємо інформацію онлайн",
        "Навчити дітей робити простий онлайн-пошук",
        "[data-activity-id='fill']"
      );

      const kindWindow = window.open("../m5-04-kind-online.html", "kind-online-smoke");
      assert(kindWindow, "Не вдалося відкрити урок про чемне онлайн-спілкування.");

      await new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error("Таймаут завантаження уроку про чемне онлайн-спілкування.")), 10000);
        kindWindow.addEventListener("load", () => {
          window.clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      const kindDoc = kindWindow.document;
      await new Promise((resolve) => window.setTimeout(resolve, 300));
      assertLessonHydrated(
        kindDoc,
        "Спілкуємося чемно онлайн",
        "Навчити дітей чемно спілкуватися",
        "[data-activity-id='classify']"
      );

      output.className = "pass";
      output.textContent = "PASS";
      lessonWindow.close();
      clickTrainerWindow.close();
      traceWindow.close();
      keyTrainerWindow.close();
      codingWindow.close();
      productWindow.close();
      searchWindow.close();
      kindWindow.close();
    } catch (error) {
      output.className = "fail";
      output.textContent = `FAIL\n${error.message}`;
    }
  </script>
</body>
</html>
