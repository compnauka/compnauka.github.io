<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Інформатика. Інтерактивний підручник для 1-2 класу: модулі, уроки та інтерактивні вправи.">
  <meta name="theme-color" content="#1a56db">
  <title>Інформатика. Інтерактивний підручник для 1-2 класу</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="student-mode">
  <a class="skip-link" href="#main-content">Перейти до основного вмісту</a>

  <header class="topbar">
    <div class="container topbar__inner topbar__inner--landing">
      <div class="topbar__title">
        <h1>Інформатика.<br>Інтерактивний підручник для 1-2 класу</h1>
      </div>
      <div class="mode-box mode-box--landing" aria-label="Перемикач режиму">
        <div class="mode-segmented" role="group" aria-label="Режим перегляду головної сторінки">
          <button type="button" class="mode-option" id="mode-student" data-mode="student" aria-pressed="true">Учень</button>
          <button type="button" class="mode-option" id="mode-teacher" data-mode="teacher" aria-pressed="false">Вчитель</button>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content" class="container layout">
    <p class="landing-page-lead teacher-only">Модулі, мета уроку, орієнтири з шаблону та <strong>офіційні формулювання ІФО</strong> для кожного уроку.</p>

    <section class="student-only" aria-label="Модулі та уроки для учня">
      <h2 class="sr-only">Модулі підручника для учня</h2>
      <div id="landing-student-modules" class="landing-modules" aria-live="polite"></div>
    </section>

    <section class="teacher-only" aria-label="Модулі та методичні матеріали для вчителя">
      <h2 class="sr-only">Модулі підручника для вчителя</h2>
      <div id="landing-teacher-modules" class="landing-modules" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="js/landing.js"></script>
</body>
</html>
