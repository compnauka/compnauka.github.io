        };
        
        // --- Допоміжні функції ---
        const getEnemyPlayerNum = () => gameState.playerNumber === 1 ? 2 : 1;
        const getMyPlayerData = () => gameState.localData?.[`player${gameState.playerNumber}`];
        const showLoading = () => {
            document.getElementById('loading').classList.add('show');
            document.getElementById('loadingBackdrop').classList.add('show');
        };
        const hideLoading = () => {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('loadingBackdrop').classList.remove('show');
        };
        const hasGameExpired = (createdAt) => {
            const timestamp = Number(createdAt);
            return Number.isFinite(timestamp) && (Date.now() - timestamp > GAME_DURATION);
        };
        const debounce = (func, wait) => {
            let timeout;
            return function executedFunction(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        };
        async function reserveNewGameCode(initialGameState, maxAttempts = 20) {
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const candidateCode = Math.floor(100000 + Math.random() * 900000).toString();
                const candidateRef = ref(db, `games/${candidateCode}`);

                const txResult = await runTransaction(candidateRef, (currentData) => {
                    if (currentData !== null) return;
                    return initialGameState;
                }, { applyLocally: false });

                if (txResult.committed) {
                    const checkSnapshot = await get(candidateRef);
                    if (!checkSnapshot.exists()) {
                        console.error('Код згенеровано, але гру не знайдено в Firebase:', candidateCode);
                        throw new Error('GAME_WAS_NOT_SAVED');
                    }
                    console.log('Гру створено:', candidateCode);
                    return candidateCode;
                }
            }
            throw new Error('NO_FREE_GAME_CODE');
        }


        // --- Основна логіка ---
        
        function cleanupGame(message) {
            if (gameState.unsubscribeListener) {
                gameState.unsubscribeListener();
                gameState.unsubscribeListener = null;
            }
            if (gameState.sessionTimer) clearTimeout(gameState.sessionTimer);
            if (gameState.visualTimer) clearInterval(gameState.visualTimer);
            
            if(gameState.playerNumber === 1 && gameState.code) {
                remove(ref(db, `games/${gameState.code}`));
            }

            showMessage(message || "Гру завершено.");
            enemyBoardEl.classList.add('disabled');
            myBoardEl.classList.add('disabled');
            statusEl.textContent = "Гру завершено!";
            timerEl.textContent = '';
        }

        window.addEventListener('beforeunload', (e) => {
            if (gameState.localData && !gameState.localData.winner && gameState.localData.gameStarted) {
                e.preventDefault();
                e.returnValue = 'Гра ще не завершена. Ви впевнені, що хочете вийти?';
                return e.returnValue;
            }
            if (gameState.unsubscribeListener) gameState.unsubscribeListener();
        });
        
        let menuMessageTimer = null;
        function showMenuMessage(message, duration = 6000) {
            const msgEl = document.getElementById('menuMessage');
            msgEl.textContent = message;
            if (menuMessageTimer) clearTimeout(menuMessageTimer);
            menuMessageTimer = setTimeout(() => { msgEl.textContent = ''; }, duration);
        }

        window.createGame = async function() {
            showLoading();
            try {
                initAudio();
                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }
                const authUid = auth.currentUser.uid;
                playerId = getTabPlayerId();

                gameState.playerNumber = 1;

                const initialGameState = {
                    player1: { id: playerId, uid: authUid, ready: false, board: null },
                    player2: { ready: false },
                    currentTurn: 1,
                    gameStarted: false,
                    moves: [],
                    winner: null,
                    createdAt: Date.now()
                };
                
                gameState.code = await reserveNewGameCode(initialGameState);

                showGameArea();
                listenToGame();
                
                if (gameState.sessionTimer) clearTimeout(gameState.sessionTimer);
                gameState.sessionTimer = setTimeout(() => cleanupGame("Час гри вичерпано!"), GAME_DURATION);
            } catch (error) {
                console.error("Помилка створення гри:", error);
                if (String(error).includes('PERMISSION_DENIED')) {
                    showMenuMessage("Відмовлено в доступі. Налаштуйте правила безпеки Firebase.");
                } else if (String(error).includes('NO_FREE_GAME_CODE')) {
                    showMenuMessage("Не вдалося згенерувати вільний код. Спробуйте ще раз.");
                } else if (String(error).includes('GAME_WAS_NOT_SAVED')) {
                    showMenuMessage("Гру не вдалося зберегти в Firebase. Перевірте правила бази.");
                } else {
                    showMenuMessage("Не вдалося створити гру. Перевірте з'єднання.");
                }
            } finally {
                hideLoading();
            }
        };

        window.joinGame = async function() {
            showLoading();
            try {
                initAudio();
                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }

                const authUid = auth.currentUser.uid;
                playerId = getTabPlayerId();

                const codeInput = document.getElementById('joinCode').value;
                const sanitizedCode = codeInput.replace(/[^0-9]/g, '');

                if (sanitizedCode.length !== 6) {
                    return showMenuMessage("Код має складатися з 6 цифр!");
                }

                const gameRef = ref(db, `games/${sanitizedCode}`);

                // First read the room directly. Do not use a whole-game transaction for this check:
                // runTransaction can initially receive null before the remote value is cached.
                const gameSnapshot = await get(gameRef);
                if (!gameSnapshot.exists()) {
                    return showMenuMessage('Гра не знайдена! Перевірте код або оновіть сторінку з грою.');
                }

                const gameData = gameSnapshot.val();
                if (hasGameExpired(gameData.createdAt)) {
                    return showMenuMessage('Термін дії гри минув! Створіть нову гру.');
                }
                if (gameData.gameStarted) {
                    return showMenuMessage('Гра вже почалася. Створіть нову кімнату.');
                }
                if (gameData.player1?.id === playerId) {
                    return showMenuMessage("Це ваша кімната. Для тесту другого гравця відкрийте іншу вкладку, інкогніто або інший пристрій.");
                }

                const player2Ref = ref(db, `games/${sanitizedCode}/player2`);
                let joinError = '';

                // Atomically reserve only player2. This prevents two users from joining the same room.
                const txResult = await runTransaction(player2Ref, (player2Data) => {
                    if (player2Data?.id && player2Data.id !== playerId) {
                        joinError = 'ROOM_TAKEN';
                        return;
                    }

                    return {
                        id: playerId,
                        uid: authUid,
                        ready: false
                    };
                }, { applyLocally: false });

                if (!txResult.committed) {
                    if (joinError === 'ROOM_TAKEN') return showMenuMessage('Кімната вже зайнята!');
                    return showMenuMessage("Помилка приєднання. Спробуйте ще раз.");
                }

                gameState.code = sanitizedCode;
                gameState.playerNumber = 2;
                showGameArea();
                listenToGame();
            } catch(error) {
                console.error("Помилка приєднання до гри:", error);
                if (String(error).includes('PERMISSION_DENIED')) {
                     showMenuMessage("Відмовлено в доступі. Перевірте правила безпеки Firebase.");
                } else {
                    showMenuMessage("Помилка приєднання. Перевірте код та з'єднання.");
                }
            } finally {
                hideLoading();
            }
        };

        function listenToGame() {
            if (gameState.unsubscribeListener) gameState.unsubscribeListener();

            const gameRef = ref(db, `games/${gameState.code}`);
            gameState.unsubscribeListener = onValue(gameRef, (snapshot) => {
                if (!snapshot.exists()) return cleanupGame("Гру було видалено або вона завершилась.");
                
                const gameData = snapshot.val();
                if (hasGameExpired(gameData.createdAt)) return cleanupGame("Час гри вичерпано!");
                
                gameState.localData = gameData;

                const { player1: p1, player2: p2, gameStarted } = gameData;
                if (p1?.id && p2?.id && !gameStarted && p1.ready && p2.ready && gameState.playerNumber === 1) {
                    update(ref(db, `games/${gameState.code}`), { gameStarted: true });
                }
                updateUI();
            });
        }
        
        function updateTimer() {
            if (!gameState.localData?.createdAt) return;
            const createdAt = Number(gameState.localData.createdAt);
            if (!Number.isFinite(createdAt)) return;
            const elapsed = Date.now() - createdAt;
            const remaining = Math.max(0, GAME_DURATION - elapsed);
            const mins = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);
            timerEl.textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateUI() {
            if (!gameState.localData) return;
            
            if (gameState.localData.createdAt && !gameState.visualTimer) {
                gameState.visualTimer = setInterval(updateTimer, 1000);
                updateTimer();
            }

            const isMyTurn = gameState.localData.currentTurn === gameState.playerNumber;
            const myData = getMyPlayerData();
            const enemyData = gameState.localData?.[`player${getEnemyPlayerNum()}`];
            
            if (gameState.localData.winner) {
                if(gameState.sessionTimer) clearTimeout(gameState.sessionTimer);
                if(gameState.visualTimer) clearInterval(gameState.visualTimer);

                if(!document.getElementById('messageOverlay').style.display || document.getElementById('messageOverlay').style.display === 'none') {
                    sounds.play(gameState.localData.winner === gameState.playerNumber ? 'win' : 'sunk');
                }
                gameState.isSetupPhase = false;
                showMessage(gameState.localData.winner === gameState.playerNumber ? "🎉 Перемога! 🎉" : "😥 Ви програли 😥");

                 enemyBoardEl.classList.remove('active-turn');
                 myBoardEl.classList.remove('active-turn');
                 statusEl.textContent = "Гру завершено!";
            } else if (gameState.localData.gameStarted) {
                gameState.isSetupPhase = false;
                rotateBtn.classList.add('hidden');
                randomBtn.classList.add('hidden');
                document.getElementById('shipsList').classList.add('hidden');
                statusEl.textContent = isMyTurn ? "🎯 Ваш хід!" : `⏳ Хід суперника...`;
                enemyBoardEl.classList.toggle('active-turn', isMyTurn);
                myBoardEl.classList.toggle('active-turn', !isMyTurn);
            } else {
                if (!enemyData?.id) statusEl.textContent = "Очікування суперника...";
                else if (myData?.ready) statusEl.textContent = "Очікуємо готовності суперника...";
                else statusEl.textContent = "Розставте свої кораблі!";
            }
            renderBoards();
        }
        
        function renderBoards() {
            const myBoardToRender = getMyPlayerData()?.board || gameState.myBoard;
            
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    myBoardEl.children[r * 10 + c].className = `cell ${myBoardToRender[r][c] > 0 ? 'ship' : ''}`;
                }
            }
            
            const moves = gameState.localData.moves ? Object.values(gameState.localData.moves) : [];
            const { sunkShips } = processMoves(moves);

            moves.forEach(move => {
                const boardEl = move.player === gameState.playerNumber ? enemyBoardEl : myBoardEl;
                boardEl.children[move.row * 10 + move.col].classList.add(move.result);
            });
            
            if (sunkShips.length > lastSunkCount) {
                sounds.play('sunk');
                lastSunkCount = sunkShips.length;
            }
            
            sunkShips.forEach(ship => {
                const boardEl = ship.playerNum === gameState.playerNumber ? myBoardEl : enemyBoardEl;
                ship.cells.forEach(pos => {
                    boardEl.children[pos.row * 10 + pos.col].classList.add('sunk');
                });
            });
        }
        
        function processMoves(moves) {
            let sunkShips = [];
            const { player1, player2 } = gameState.localData;
            if (!player1?.board || !player2?.board) return { sunkShips };
            
            const p1_hits = moves.filter(m => m.player === 1 && m.result === 'hit');
            const p2_hits = moves.filter(m => m.player === 2 && m.result === 'hit');

            const shipIdsOnBoard1 = new Set(player1.board.flat().filter(id => id > 0));
            shipIdsOnBoard1.forEach(id => {
                if (isShipSunk(id, player1.board, p2_hits)) {
                    sunkShips.push({ playerNum: 1, cells: getShipCells(id, player1.board) });
                }
            });

            const shipIdsOnBoard2 = new Set(player2.board.flat().filter(id => id > 0));
            shipIdsOnBoard2.forEach(id => {
                if (isShipSunk(id, player2.board, p1_hits)) {
                    sunkShips.push({ playerNum: 2, cells: getShipCells(id, player2.board) });
                }
            });
            return { sunkShips };
        }

        function showGameArea() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            document.getElementById('displayCode').textContent = gameState.code;
        }
        
        const SHOT_DEBOUNCE_MS = window.matchMedia('(pointer: coarse)').matches ? 120 : 300;
        const debouncedHandleEnemyClick = debounce(handleEnemyBoardClick, SHOT_DEBOUNCE_MS);

        function createBoardDOM(boardId, clickHandler) {
            const boardEl = document.getElementById(boardId);
            boardEl.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const row = Math.floor(i / 10);
                const col = i % 10;
                
                cell.setAttribute('role', 'button');
                cell.setAttribute('aria-label', `Клітинка ${String.fromCharCode(65 + col)}${row + 1}`);
                cell.tabIndex = boardId === 'enemyBoard' ? 0 : -1;
                
                cell.dataset.row = row;
                cell.dataset.col = col;

                const currentClickHandler = boardId === 'enemyBoard' ? debouncedHandleEnemyClick : clickHandler;
                cell.addEventListener('click', () => currentClickHandler(row, col));
                
                cell.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        currentClickHandler(row, col);
                    }
                });
                
                if (boardId === 'myBoard') {
                    cell.addEventListener('mouseenter', () => previewShip(row, col));
                    cell.addEventListener('mouseleave', clearPreview);
                }
                boardEl.appendChild(cell);
            }
        }
        
        function showMessage(msg) {
             const overlay = document.getElementById('messageOverlay');
             if (overlay.style.display === 'flex') return;
             document.getElementById('messageText').textContent = msg;
             overlay.style.display = 'flex';
        }

        function handleMyBoardClick(row, col) {
            if (!gameState.isSetupPhase || gameState.currentShipIndex >= SHIPS_CONFIG.length) return;
            const size = SHIPS_CONFIG[gameState.currentShipIndex];
            if (canPlaceShip(row, col, size, gameState.isHorizontal, gameState.myBoard)) {
                for (let i = 0; i < size; i++) {
                    const r = gameState.isHorizontal ? row : row + i;
                    const c = gameState.isHorizontal ? col + i : col;
                    gameState.myBoard[r][c] = gameState.currentShipIndex + 1;
                }
                gameState.currentShipIndex++;
                updateShipsList();
                renderMyPlacement();
                if (gameState.currentShipIndex >= SHIPS_CONFIG.length) finishSetup();
            }
        }
        
        function renderMyPlacement() {
            for (let r = 0; r < 10; r++) for (let c = 0; c < 10; c++) {
                myBoardEl.children[r * 10 + c].classList.toggle('ship', gameState.myBoard[r][c] > 0);
            }
        }

        function previewShip(row, col) {
            if (!gameState.isSetupPhase || gameState.currentShipIndex >= SHIPS_CONFIG.length) return;
            clearPreview();
            const size = SHIPS_CONFIG[gameState.currentShipIndex];
            const canPlace = canPlaceShip(row, col, size, gameState.isHorizontal, gameState.myBoard);
            for (let i = 0; i < size; i++) {
                const r = gameState.isHorizontal ? row : row + i;
                const c = gameState.isHorizontal ? col + i : col;
                if (r < 10 && c < 10) {
                    const cell = myBoardEl.children[r * 10 + c];
                    if (!cell.classList.contains('ship')) cell.classList.add(canPlace ? 'preview-ok' : 'preview-bad');
                }
            }
        }

        function clearPreview() {
            myBoardEl.querySelectorAll('.preview-ok, .preview-bad').forEach(c => c.classList.remove('preview-ok', 'preview-bad'));
        }
        
        window.rotateShip = () => { gameState.isHorizontal = !gameState.isHorizontal; };
        window.randomizeShips = async () => {
            if (!gameState.isSetupPhase || gameState.currentShipIndex >= SHIPS_CONFIG.length || gameState.isRandomizing) return;
            gameState.isRandomizing = true;
            gameState.isSetupPhase = false;
            randomBtn.disabled = true;
            rotateBtn.disabled = true;
            let completed = false;

            const buildRandomBoard = () => {
                const board = Array(10).fill(null).map(() => Array(10).fill(0));
                for (let shipIndex = 0; shipIndex < SHIPS_CONFIG.length; shipIndex++) {
                    const size = SHIPS_CONFIG[shipIndex];
                    let placed = false;

                    for (let attempt = 0; attempt < 200; attempt++) {
                        const horizontal = Math.random() < 0.5;
                        const row = Math.floor(Math.random() * 10);
                        const col = Math.floor(Math.random() * 10);
                        if (!canPlaceShip(row, col, size, horizontal, board)) continue;

                        for (let i = 0; i < size; i++) {
                            const r = horizontal ? row : row + i;
                            const c = horizontal ? col + i : col;
                            board[r][c] = shipIndex + 1;
                        }
                        placed = true;
                        break;
                    }
                    if (!placed) return null;
                }
                return board;
            };

            try {
                let nextBoard = null;
                for (let retry = 0; retry < 50 && !nextBoard; retry++) {
                    nextBoard = buildRandomBoard();
                }
                if (!nextBoard) return;

                gameState.myBoard = nextBoard;
                gameState.currentShipIndex = SHIPS_CONFIG.length;
                updateShipsList();
                renderMyPlacement();
                await finishSetup();
                completed = true;
            } finally {
                gameState.isRandomizing = false;
                if (!completed) {
                    gameState.isSetupPhase = true;
                    randomBtn.disabled = false;
                    rotateBtn.disabled = false;
                }
            }
        };

        function canPlaceShip(row, col, size, horizontal, board) {
            for (let i = 0; i < size; i++) {
                const r = horizontal ? row : row + i;
                const c = horizontal ? col + i : col;
                if (r >= 10 || c >= 10) return false;
                for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < 10 && nc >= 0 && nc < 10 && board[nr][nc] !== 0) return false;
                }
            }
            return true;
        }
        
        function updateShipsList() {
            let shipsToPlace = SHIPS_CONFIG.slice(gameState.currentShipIndex);
            if (shipsToPlace.length === 0) {
                 document.getElementById('shipsList').innerHTML = "✅ Всі кораблі розставлено!";
                 return;
            }
            const counts = shipsToPlace.reduce((acc, size) => ({...acc, [size]: (acc[size] || 0) + 1 }), {});
            const currentSize = SHIPS_CONFIG[gameState.currentShipIndex];
            document.getElementById('shipsList').innerHTML = [4,3,2,1]
                .map(s => `<div class="${s === currentSize ? 'current' : ''}"><i class="fa-solid fa-ship"></i> x${s}: ${counts[s] || 0}</div>`)
                .join('');
        }

        async function finishSetup() {
            gameState.isSetupPhase = false;
            rotateBtn.classList.add('hidden');
            randomBtn.classList.add('hidden');
            await update(ref(db, `games/${gameState.code}/player${gameState.playerNumber}`), {
                board: gameState.myBoard,
                ready: true
            });
        }

        async function handleEnemyBoardClick(row, col) {
            if (!gameState.localData || gameState.localData.winner || !gameState.localData.gameStarted || gameState.isSetupPhase || gameState.localData.currentTurn !== gameState.playerNumber) return;
            let shotResult = null;
            const gameRef = ref(db, `games/${gameState.code}`);
            const txResult = await runTransaction(gameRef, (gameData) => {
                if (!gameData || gameData.winner || !gameData.gameStarted) return;
                if (gameData.currentTurn !== gameState.playerNumber) return;

                const enemyPlayerNum = gameState.playerNumber === 1 ? 2 : 1;
                const enemyBoard = gameData[`player${enemyPlayerNum}`]?.board;
                if (!enemyBoard) return;

                const moves = Array.isArray(gameData.moves) ? [...gameData.moves] : Object.values(gameData.moves || {});
                const alreadyShot = moves.some(m => m.player === gameState.playerNumber && m.row === row && m.col === col);
                if (alreadyShot) return;

                shotResult = enemyBoard[row][col] > 0 ? 'hit' : 'miss';
                moves.push({ player: gameState.playerNumber, row, col, result: shotResult });

                gameData.moves = moves;
                gameData.currentTurn = shotResult === 'miss' ? enemyPlayerNum : gameState.playerNumber;

                const totalShipCells = enemyBoard.flat().filter(cell => cell > 0).length;
                const hitsOnEnemy = moves.filter(m => m.player === gameState.playerNumber && m.result === 'hit').length;
                if (hitsOnEnemy >= totalShipCells) gameData.winner = gameState.playerNumber;

                return gameData;
            }, { applyLocally: false });

            if (!txResult.committed || !shotResult) return;
            clearActiveEnemyCell();
            sounds.play(shotResult);
            statusEl.textContent = shotResult === 'hit' ? '🎯 Влучив! Стріляйте ще!' : '❌ Промах!';
        }
        
        function getShipCells(shipId, board) {
            const cells = [];
            for (let r=0; r<10; r++) for (let c=0; c<10; c++) if (board[r][c] === shipId) cells.push({row:r, col:c});
            return cells;
        }
        
        function isShipSunk(shipId, board, hitMoves) {
            const shipCells = getShipCells(shipId, board);
            return shipCells.every(sc => hitMoves.some(h => h.row === sc.row && h.col === sc.col));
        }
        
        let activeEnemyCell = null;
        function setActiveEnemyCell(cell) {
            if (activeEnemyCell && activeEnemyCell !== cell) {
                activeEnemyCell.classList.remove('valid-shot');
            }
            activeEnemyCell = cell;
            if (activeEnemyCell && !activeEnemyCell.classList.contains('hit') && !activeEnemyCell.classList.contains('miss')) {
                activeEnemyCell.classList.add('valid-shot');
            }
        }
        function clearActiveEnemyCell() {
            if (!activeEnemyCell) return;
            activeEnemyCell.classList.remove('valid-shot');
            activeEnemyCell = null;
        }
        
        // --- Ініціалізація ---
        document.getElementById('gameCodeDisplay').onclick = () => {
            if (!gameState.code) return;

            navigator.clipboard.writeText(gameState.code).then(() => {
                const el = document.getElementById('gameCodeDisplay');
                el.innerHTML = 'Скопійовано!';
                setTimeout(() => {
                    el.innerHTML = `Код гри: <span id="displayCode">${gameState.code}</span>`;
                }, 1500);
            }).catch(() => {
                showMenuMessage(`Скопіюйте код вручну: ${gameState.code}`);
            });
        };
        
        enemyBoardEl.addEventListener('mouseover', e => {
            if (!e.target.classList.contains('cell')) return;
            setActiveEnemyCell(e.target);
        });
        enemyBoardEl.addEventListener('mouseout', e => {
            if (!e.target.classList.contains('cell')) return;
            if (e.relatedTarget && e.relatedTarget.classList?.contains('cell')) return;
            clearActiveEnemyCell();
        });
        enemyBoardEl.addEventListener('pointerdown', e => {
            if (e.pointerType !== 'touch') return;
            if (!e.target.classList.contains('cell')) return;
            setActiveEnemyCell(e.target);
        });
        enemyBoardEl.addEventListener('touchcancel', clearActiveEnemyCell, { passive: true });
        
        soundToggle.className = isMuted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
        soundToggle.title = isMuted ? 'Увімкнути звук' : 'Вимкнути звук';
        soundToggle.addEventListener('click', () => {
            isMuted = !isMuted;
            localStorage.setItem('battleshipMuted', isMuted);
            soundToggle.className = isMuted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
            soundToggle.title = isMuted ? 'Увімкнути звук' : 'Вимкнути звук';
            if(!isMuted) initAudio();
        });

        document.getElementById('joinCode').addEventListener('input', (event) => {
            event.target.value = event.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        document.getElementById('joinCode').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                joinGame();
            }
        });

        createBoardDOM('myBoard', handleMyBoardClick);
        createBoardDOM('enemyBoard', handleEnemyBoardClick);
        updateShipsList();

    </script>
</body>
</html>
