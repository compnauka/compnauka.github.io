<!DOCTYPE html>
<html lang="uk" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Танграм</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <div id="app">
        <header id="header">
            <div class="logo-wrap">
                <div class="logo-icon"><i class="fas fa-shapes"></i></div>
                <div>
                    <h1>Танграм</h1>
                    <p class="subtitle">СКЛАДИ СВОЮ КАРТИНУ</p>
                </div>
            </div>
            <div class="header-right">
                <a href="https://uk.wikipedia.org/wiki/%D0%A2%D0%B0%D0%BD%D0%B3%D1%80%D0%B0%D0%BC" target="_blank" rel="noopener noreferrer" class="hint-pill" id="hint-pill" title="Відкрити статтю у Вікіпедії">
                    <i class="fas fa-book-open"></i>
                    <span>Що таке Танграм</span>
                </a>
                <button class="icon-btn" id="btn-theme" title="Тема" aria-label="Змінити тему">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <div id="canvas-wrap">
            <canvas id="canvas"></canvas>

            <div id="sel-label">
                <div id="sel-color-dot"></div>
                <span id="sel-name"></span>
            </div>

            <div id="snap-toast">
                <i class="fas fa-magnet"></i> Прилипло!
            </div>

            <div id="kbd-hints">
                <span class="kbd-row"><kbd>Q</kbd><kbd>E</kbd> повернути</span>
                <span class="kbd-row"><kbd>F</kbd> дзеркало</span>
            </div>
        </div>

        <div id="toolbar" aria-label="Керування фігурами">
            <button class="tool-btn" id="btn-ccw" aria-label="Повернути ліворуч" title="Ліворуч (Q)">
                <i class="fas fa-rotate-left"></i><span>45°</span>
            </button>
            <button class="tool-btn" id="btn-cw" aria-label="Повернути праворуч" title="Праворуч (E)">
                <i class="fas fa-rotate-right"></i><span>45°</span>
            </button>
            <button class="tool-btn" id="btn-flip" aria-label="Віддзеркалити" title="Дзеркало (F)">
                <i class="fas fa-left-right"></i><span>Дзеркало</span>
            </button>
            <div class="divider" aria-hidden="true"></div>
            <button class="tool-btn save-btn" id="btn-save" title="Зберегти квадратне фото">
                <i class="fas fa-download"></i><span>Зберегти</span>
            </button>
            <button class="tool-btn reset-btn" id="btn-reset" title="Скинути налаштування">
                <i class="fas fa-trash-can"></i><span>Скинути</span>
            </button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
