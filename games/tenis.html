    <style>
        * {

<body>
    <div class="game-container">
        <div class="score-board">
            <div class="player-score">
                <div>Гравець 1: <span id="score1">0</span></div>
            </div>
            <div class="player-score">
                <div>Гравець 2: <span id="score2">0</span></div>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <div class="controls">
            <div>🎮 Керування 🎮</div>
            <div>Гравець 1: W / S | Гравець 2: ↑ / ↓</div>
        </div>
        
        <button class="btn" id="startBtn">Почати гру</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>Гра завершена!</h2>
        <p id="winner"></p>
        <button class="btn" id="restartBtn">Грати знову</button>
    </div>

    <script>
        // Константи гри
        const CONSTANTS = {
            WINNING_SCORE: 5,
            INITIAL_BALL_SPEED: 5,
            MAX_BALL_SPEED: 12,
            PADDLE_SPEED: 6,
            BALL_SPEED_INCREASE: 1.05,
            PADDLE_WIDTH: 15,
            PADDLE_HEIGHT: 100,
            BALL_RADIUS: 8,
            NET_SEGMENT_HEIGHT: 10,
            NET_SEGMENT_GAP: 20
        };

        // Отримання елементів DOM
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverDiv = document.getElementById('gameOver');
        const winnerText = document.getElementById('winner');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');

        // Стан гри
        let gameRunning = false;
        let animationId = null;

        // Ініціалізація canvas з урахуванням DPI
        function initCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            // Базові розміри
            const baseWidth = 800;
            const baseHeight = 500;
            
            // Адаптивні розміри
            const containerWidth = canvas.parentElement.clientWidth;
            const scale = Math.min(1, containerWidth / baseWidth);
            
            canvas.width = baseWidth * dpr;
            canvas.height = baseHeight * dpr;
            canvas.style.width = `${baseWidth * scale}px`;
            canvas.style.height = `${baseHeight * scale}px`;
            
            ctx.scale(dpr, dpr);
            
            return { width: baseWidth, height: baseHeight };
        }

        const canvasSize = initCanvas();

        // Клас гравця
        class Player {
            constructor(isLeft) {
                this.width = CONSTANTS.PADDLE_WIDTH;
                this.height = CONSTANTS.PADDLE_HEIGHT;
                this.speed = CONSTANTS.PADDLE_SPEED;
                this.score = 0;
                this.upKey = false;
                this.downKey = false;
                
                if (isLeft) {
                    this.x = 20;
                } else {
                    this.x = canvasSize.width - 35;
                }
                
                this.reset();
            }

            reset() {
                this.y = canvasSize.height / 2 - this.height / 2;
            }

            move() {
                if (this.upKey && this.y > 0) {
                    this.y -= this.speed;
                }
                if (this.downKey && this.y < canvasSize.height - this.height) {
                    this.y += this.speed;
                }
            }

            draw() {
                drawRect(this.x, this.y, this.width, this.height, '#ffc857');
            }
        }

        // Клас м'яча
        class Ball {
            constructor() {
                this.radius = CONSTANTS.BALL_RADIUS;
                this.maxSpeed = CONSTANTS.MAX_BALL_SPEED;
                this.reset();
            }

            reset() {
                this.x = canvasSize.width / 2;
                this.y = canvasSize.height / 2;
                const angle = (Math.random() * Math.PI / 2) - Math.PI / 4;
                const direction = Math.random() > 0.5 ? 1 : -1;
                this.speedX = direction * CONSTANTS.INITIAL_BALL_SPEED;
                this.speedY = CONSTANTS.INITIAL_BALL_SPEED * Math.sin(angle);
            }

            move() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Відбиття від верхньої та нижньої стінок
                if (this.y + this.radius > canvasSize.height || this.y - this.radius < 0) {
                    this.speedY = -this.speedY;
                }
            }

            checkPaddleCollision(player) {
                const collides = this.x - this.radius < player.x + player.width &&
                               this.x + this.radius > player.x &&
                               this.y - this.radius < player.y + player.height &&
                               this.y + this.radius > player.y;

                if (collides) {
                    // Розрахунок кута відбиття
                    const collidePoint = (this.y - (player.y + player.height / 2)) / (player.height / 2);
                    const angleRad = collidePoint * Math.PI / 4;
                    const direction = this.speedX < 0 ? 1 : -1;
                    
                    // Збільшення швидкості
                    this.speedX = direction * Math.abs(this.speedX) * CONSTANTS.BALL_SPEED_INCREASE;
                    this.speedY = Math.abs(this.speedX) * Math.sin(angleRad);
                    
                    // Обмеження максимальної швидкості
                    if (Math.abs(this.speedX) > this.maxSpeed) {
                        this.speedX = direction * this.maxSpeed;
                        this.speedY = this.maxSpeed * Math.sin(angleRad);
                    }
                }

                return collides;
            }

            draw() {
                drawCircle(this.x, this.y, this.radius, '#ff6b6b');
            }
        }

        // Ініціалізація гравців та м'яча
        const player1 = new Player(true);
        const player2 = new Player(false);
        const ball = new Ball();

        // Функції малювання
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawNet() {
            const centerX = canvasSize.width / 2;
            for (let i = 0; i < canvasSize.height; i += CONSTANTS.NET_SEGMENT_GAP) {
                drawRect(centerX - 2, i, 4, CONSTANTS.NET_SEGMENT_HEIGHT, 'rgba(255, 200, 100, 0.3)');
            }
        }

        function render() {
            // Очищення canvas
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvasSize.width, canvasSize.height);
            
            drawNet();
            player1.draw();
            player2.draw();
            ball.draw();
        }

        // Оновлення рахунку
        function updateScore() {
            score1El.textContent = player1.score;
            score2El.textContent = player2.score;
        }

        // Перевірка голу
        function checkGoal() {
            if (ball.x - ball.radius < 0) {
                player2.score++;
                updateScore();
                ball.reset();
                
                if (player2.score >= CONSTANTS.WINNING_SCORE) {
                    endGame(2);
                }
            } else if (ball.x + ball.radius > canvasSize.width) {
                player1.score++;
                updateScore();
                ball.reset();
                
                if (player1.score >= CONSTANTS.WINNING_SCORE) {
                    endGame(1);
                }
            }
        }

        // Головний ігровий цикл
        function gameLoop() {
            if (!gameRunning) return;
            
            player1.move();
            player2.move();
            ball.move();
            ball.checkPaddleCollision(player1);
            ball.checkPaddleCollision(player2);
            checkGoal();
            render();
            
            animationId = requestAnimationFrame(gameLoop);
        }

        // Управління грою
        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            startBtn.textContent = 'Гра йде...';
            startBtn.disabled = true;
            gameLoop();
        }

        function endGame(winner) {
            gameRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            winnerText.textContent = `Гравець ${winner} переміг! 🏆`;
            gameOverDiv.style.display = 'block';
            startBtn.disabled = false;
            startBtn.textContent = 'Почати гру';
        }

        function resetGame() {
            player1.score = 0;
            player2.score = 0;
            player1.reset();
            player2.reset();
            ball.reset();
            updateScore();
            gameOverDiv.style.display = 'none';
            startGame();
        }

        // Обробка клавіатури
        const keyMap = {
            'w': () => player1.upKey = true,
            'W': () => player1.upKey = true,
            'ц': () => player1.upKey = true,
            'Ц': () => player1.upKey = true,
            's': () => player1.downKey = true,
            'S': () => player1.downKey = true,
            'і': () => player1.downKey = true,
            'І': () => player1.downKey = true,
            'ArrowUp': () => player2.upKey = true,
            'ArrowDown': () => player2.downKey = true
        };

        const keyUpMap = {
            'w': () => player1.upKey = false,
            'W': () => player1.upKey = false,
            'ц': () => player1.upKey = false,
            'Ц': () => player1.upKey = false,
            's': () => player1.downKey = false,
            'S': () => player1.downKey = false,
            'і': () => player1.downKey = false,
            'І': () => player1.downKey = false,
            'ArrowUp': () => player2.upKey = false,
            'ArrowDown': () => player2.downKey = false
        };

        document.addEventListener('keydown', (e) => {
            if (keyMap[e.key]) {
                e.preventDefault();
                keyMap[e.key]();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (keyUpMap[e.key]) {
                e.preventDefault();
                keyUpMap[e.key]();
            }
        });

        // Обробка зміни розміру вікна
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const wasRunning = gameRunning;
                if (wasRunning) {
                    gameRunning = false;
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                    }
                }
                
                const newSize = initCanvas();
                Object.assign(canvasSize, newSize);
                
                // Перерахунок позицій
                player1.x = 20;
                player2.x = canvasSize.width - 35;
                player1.y = Math.min(player1.y, canvasSize.height - player1.height);
                player2.y = Math.min(player2.y, canvasSize.height - player2.height);
                ball.x = Math.min(Math.max(ball.x, ball.radius), canvasSize.width - ball.radius);
                ball.y = Math.min(Math.max(ball.y, ball.radius), canvasSize.height - ball.radius);
                
                render();
                
                if (wasRunning) {
                    gameRunning = true;
                    gameLoop();
                }
            }, 250);
        });

        // Слухачі подій
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', resetGame);

        // Початковий рендер
        render();
    </script>
</body>
