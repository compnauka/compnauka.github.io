<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Neon Wave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines" aria-hidden="true"></div>
    <canvas id="gameCanvas" aria-label="Ігрове поле Neon Wave"></canvas>

    <header class="top-controls">
        <button id="mute-btn" class="small-btn" type="button">Звук: Увімк</button>
        <button id="pause-btn" class="small-btn" type="button">Пауза</button>
        <button id="exit-btn" class="small-btn danger" type="button">Вийти</button>
    </header>

    <main id="ui-layer" class="ui-layer">
        <section id="menu-panel" class="panel">
            <h1 class="title">NEON WAVE</h1>
            <p class="subtitle">Утримуйте натискання, щоб піднятись. Відпускайте, щоб спускатися.</p>
            <p class="hint">Оберіть рівень складності:</p>
            <div class="difficulty-grid">
                <button id="start-beginner" class="btn" type="button">Початківець</button>
                <button id="start-master" class="btn" type="button">Майстер</button>
            </div>
        </section>

        <section id="result-panel" class="panel hidden" aria-live="polite">
            <h2 id="result-title" class="title-sm">Результат</h2>
            <p id="result-subtitle" class="subtitle"></p>
            <div class="difficulty-grid">
                <button id="retry-btn" class="btn" type="button">Грати ще</button>
                <button id="menu-btn" class="btn secondary" type="button">Меню</button>
            </div>
        </section>
    </main>

    <section id="hud" class="hud hidden" aria-live="polite">
        <div id="hud-difficulty">Складність: -</div>
        <div id="hud-progress">Прогрес: 0%</div>
        <div id="hud-score">Очки: 0</div>
        <div id="hud-reward">Нагорода: -</div>
    </section>

    <script src="script.js"></script>
</body>
</html>
